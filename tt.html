<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>דיווח שעות — בן אבי רואה חשבון</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100vh;
      font-family: 'Segoe UI', Arial, sans-serif;
      direction: rtl;
      background: linear-gradient(160deg, #0f172a 0%, #1e3a8a 45%, #2563eb 100%);
    }

    /* ── HEADER BAR ── */
    #header {
      position: sticky;
      top: 0;
      z-index: 200;
      background: rgba(10, 18, 42, 0.95);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      height: 48px;
    }
    #header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    #logo-badge {
      width: 32px; height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, #B8860B, #D4A017, #F0C040);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 900; color: #0a1520;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
      flex-shrink: 0;
    }
    #logo-badge:hover {
      transform: scale(1.08);
      box-shadow: 0 2px 10px rgba(212,160,23,0.5);
    }
    #header-title {
      font-size: 13px;
      font-weight: 700;
      color: rgba(255,255,255,0.85);
      line-height: 1.2;
    }
    #header-subtitle {
      font-size: 10px;
      color: rgba(255,255,255,0.45);
      font-weight: 400;
    }
    #header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #back-to-app {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.7);
      font-size: 11px;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 5px;
      text-decoration: none;
      transition: all .15s;
    }
    #back-to-app:hover {
      background: rgba(255,255,255,0.14);
      color: #fff;
      border-color: rgba(255,255,255,0.3);
    }

    /* ── SIDEBAR (hidden on this standalone page — tabs replaced by header) ── */
    #tabbar { display: none !important; }

    /* ── MAIN CONTENT ── */
    #app {
      min-height: calc(100vh - 48px);
    }
    #tt-root {
      min-height: calc(100vh - 48px);
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }

    /* ── LOADING SPLASH ── */
    #tt-splash {
      position: fixed;
      inset: 0;
      background: linear-gradient(160deg, #0f172a 0%, #1e3a8a 45%, #2563eb 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      gap: 16px;
      transition: opacity .4s ease;
    }
    #tt-splash.fade-out { opacity: 0; pointer-events: none; }
    .splash-logo {
      width: 64px; height: 64px;
      border-radius: 16px;
      background: linear-gradient(135deg, #B8860B, #D4A017, #F0C040);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; font-weight: 900; color: #0a1520;
      box-shadow: 0 8px 32px rgba(212,160,23,0.4);
    }
    .splash-title { font-size: 20px; font-weight: 800; color: #fff; }
    .splash-sub { font-size: 13px; color: rgba(255,255,255,0.55); }
    .splash-spinner {
      width: 28px; height: 28px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: #93c5fd;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── MOBILE SAFE AREA ── */
    @media (max-width: 767px) {
      #header { padding: 0 12px; }
      #header-title { font-size: 12px; }
    }
  </style>
</head>
<body>

<!-- SPLASH SCREEN -->
<div id="tt-splash">
  <div class="splash-logo">LB</div>
  <div class="splash-title">דיווח שעות</div>
  <div class="splash-sub">בן אבי רואה חשבון</div>
  <div class="splash-spinner"></div>
</div>

<!-- HEADER -->
<div id="header">
  <div id="header-right">
    <div id="logo-badge" onclick="location.reload()" title="רענן">LB</div>
    <div>
      <div id="header-title">⏱ דיווח שעות</div>
      <div id="header-subtitle">בן אבי רואה חשבון</div>
    </div>
  </div>
  <div id="header-left">
    <a href="javascript:void(0)" id="back-to-app" onclick="if(typeof ttLogout==='function')ttLogout();else location.reload()">↩ יציאה</a>
  </div>
</div>

<!-- DUMMY ELEMENTS so the TT module doesn't crash looking for them -->
<div id="tabbar" style="display:none"></div>
<div id="login-screen" style="display:none"></div>

<!-- MAIN APP AREA -->
<div id="app">
  <div id="tt-root"></div>
</div>

<!-- TT MODULE v8 -->
<script>
// ═══════════════ TIME TRACKER MODULE v8 ═══════════════
// Admin dashboard | Client lock | Retroactive lock
(function(){

// ── ADMIN CONFIG ─────────────────────────────────────────
// Admin password is configured per-installation — not stored in source code
const ADMIN_PASS = "";

// ── GLOBAL APP STYLES (sidebar + bg) ─────────────────────
const _g=document.createElement('style');
_g.textContent=`
  body {
    background: linear-gradient(160deg,#0f172a 0%,#1e3a8a 45%,#2563eb 100%) !important;
    min-height:100vh;
  }
  .screen, #app, #login-screen { background:transparent !important; }
  .chat-msgs { background:rgba(15,23,42,0.55) !important; }
  .chat-input { background:rgba(15,23,42,0.7) !important; }
  .msg-ai { background:rgba(15,23,42,0.8) !important; border-color:rgba(255,255,255,0.1) !important; color:#e8eaf0 !important; }
  .msg-user { background:rgba(30,64,175,0.6) !important; color:#fff !important; }
`;
document.head.appendChild(_g);

// ── TT-SPECIFIC STYLES ────────────────────────────────────
const _s=document.createElement('style');
_s.textContent=`
  :root {
    --blue:#1E40AF; --blue-light:#3B82F6; --blue-pale:#EFF6FF; --blue-border:#DBEAFE;
    --dark:#0F172A; --text:#1E293B; --muted:#475569; --subtle:#64748B;
    --border:#E2E8F0; --surface:#F8FAFC; --white:#FFFFFF;
    --red:#DC2626; --red-bg:#FEF2F2; --red-border:#FECACA;
    --yellow:#D97706; --yellow-bg:#FFFBEB; --yellow-border:#FDE68A;
    --green:#16A34A; --green-bg:#F0FDF4; --green-border:#BBF7D0;
    --orange:#EA580C; --orange-bg:#FFF7ED; --orange-border:#FED7AA;
  }
  #screen-tt { background:transparent !important; }
  .tt-bar{background:rgba(255,255,255,0.95);border-bottom:1px solid var(--border);padding:8px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:48px;z-index:10;backdrop-filter:blur(10px);}
  .tt-bar-title{font-size:18px;font-weight:800;color:var(--blue);}
  .tt-bar-r{display:flex;align-items:center;gap:8px;}
  .tt-av{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--blue-light));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;}
  .tt-nm{font-size:12px;font-weight:600;color:var(--text);}
  .tt-xbtn{background:transparent;border:1px solid var(--border);color:var(--muted);font-size:11px;padding:4px 10px;border-radius:6px;cursor:pointer;font-family:inherit;}
  .tt-xbtn:hover{border-color:var(--blue-light);color:var(--blue);}
  .tt-admin-btn{background:linear-gradient(135deg,#7c3aed,#6d28d9);border:none;color:#fff;font-size:11px;padding:4px 10px;border-radius:6px;cursor:pointer;font-family:inherit;font-weight:700;}
  .tt-admin-btn:hover{background:linear-gradient(135deg,#6d28d9,#5b21b6);}
  .tt{max-width:640px;margin:0 auto;padding:6px 12px 20px;direction:rtl;font-family:'Segoe UI',Arial,sans-serif;}
  .tt-tabs{display:flex;gap:4px;margin-bottom:8px;}
  .tt-tab{flex:1;padding:6px;border-radius:9px;border:1px solid var(--border);background:#fff;color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;}
  .tt-tab.on{background:var(--blue);color:#fff;border-color:var(--blue);box-shadow:0 2px 8px rgba(30,64,175,.25);}
  .tt-dbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
  .tt-dlbl{font-size:13px;font-weight:700;color:#fff;cursor:pointer;display:flex;align-items:center;gap:5px;text-shadow:0 1px 3px rgba(0,0,0,.3);}
  .tt-dlbl:hover{color:#93c5fd;}
  .tt-today{font-size:10px;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);padding:1px 6px;border-radius:5px;font-weight:700;}
  .tt-nav{display:flex;gap:4px;}
  .tt-nav button{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);color:#fff;width:28px;height:28px;border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}
  .tt-nav button:hover{background:rgba(255,255,255,.25);}
  .tt-nav button:disabled{opacity:.3;cursor:not-allowed;}
  .tt-card{background:rgba(255,255,255,0.95);border:1px solid rgba(255,255,255,.5);border-radius:14px;padding:8px 12px;margin-bottom:6px;box-shadow:0 2px 8px rgba(0,0,0,.08);backdrop-filter:blur(8px);}
  .tt-att{background:rgba(255,255,255,0.88);border:1px solid rgba(255,255,255,0.6);border-radius:14px;padding:8px 12px;margin-bottom:6px;box-shadow:0 2px 8px rgba(0,0,0,.08);}
  .tt-att-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
  .tt-att-title{font-size:14px;font-weight:700;color:#1e40af;text-transform:uppercase;letter-spacing:.7px;}
  .tt-att-sum{font-size:13px;font-weight:800;color:var(--text);}
  .tt-att-sum span{color:var(--blue);}
  .tt-att-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .tt-afield label{display:block;font-size:12px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px;}
  .tt-tbox{width:100%;background:#fff;border:2px solid #BFDBFE;color:#1e40af;padding:6px 10px;border-radius:8px;font-size:16px;font-weight:800;font-family:'Segoe UI',Arial,sans-serif;text-align:center;letter-spacing:3px;direction:ltr;box-shadow:0 1px 4px rgba(30,64,175,0.08);}
  .tt-tbox:focus{outline:none;border-color:var(--blue-light);box-shadow:0 0 0 3px rgba(59,130,246,0.15);}
  .tt-tbox.set{border-color:var(--blue-light);background:#EFF6FF;color:var(--blue);}
  .tt-tbox::placeholder{color:#94A3B8;font-size:14px;font-weight:400;letter-spacing:1px;}
  .tt-tbox:disabled{opacity:0.45;cursor:not-allowed;background:#f1f5f9;}
  .tt-dbl{font-size:11px;color:#64748b;text-align:center;margin-top:3px;}
  .tt-alert{display:flex;align-items:center;gap:8px;border-radius:8px;padding:8px 12px;margin-bottom:8px;font-size:12px;font-weight:600;flex-wrap:wrap;}
  .tt-alert.warn{background:var(--yellow-bg);border:1px solid var(--yellow-border);color:var(--yellow);}
  .tt-alert.ok{background:var(--green-bg);border:1px solid var(--green-border);color:var(--green);}
  .tt-alert.err{background:var(--red-bg);border:1px solid var(--red-border);color:var(--red);}
  .tt-alert.info{background:var(--blue-pale);border:1px solid var(--blue-border);color:var(--blue);}
  .tt-form{background:rgba(255,255,255,0.88);border:1px solid rgba(255,255,255,0.6);border-radius:14px;padding:8px 12px;margin-bottom:6px;box-shadow:0 2px 8px rgba(0,0,0,.08);}
  .tt-ftitle{font-size:12px;font-weight:700;color:#1e40af;margin-bottom:6px;}
  .tt-r2{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;}
  .tt-fg{margin-bottom:6px;}
  .tt-fl{display:block;font-size:12px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px;}
  .tt-fi{width:100%;background:#fff;border:1.5px solid #E2E8F0;color:#1E293B;padding:6px 10px;border-radius:8px;font-size:13px;font-family:'Segoe UI',Arial,sans-serif;direction:rtl;}
  .tt-fi:focus{outline:none;border-color:var(--blue-light);}
  .tt-fs{width:100%;background:#fff;border:1.5px solid #E2E8F0;color:#1E293B;padding:6px 10px;border-radius:8px;font-size:13px;font-family:'Segoe UI',Arial,sans-serif;direction:rtl;appearance:auto;}
  .tt-fs:focus{outline:none;border-color:var(--blue-light);}
  .tt-fs option{background:#fff;color:#1E293B;}
  .tt-tfi{text-align:center;font-size:14px;font-weight:800;letter-spacing:3px;direction:ltr;}
  .tt-tfi::placeholder{color:#94A3B8;font-size:13px;font-weight:400;letter-spacing:1px;}
  .tt-hint{font-size:11px;color:#3b82f6;margin-top:2px;}
  .tt-dur{display:inline-flex;align-items:center;gap:5px;background:var(--blue-pale);border:1px solid var(--blue-border);color:var(--blue);padding:5px 11px;border-radius:7px;font-size:13px;font-weight:800;margin-bottom:8px;}
  .tt-chk{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
  .tt-chk input{width:15px;height:15px;accent-color:var(--blue);cursor:pointer;}
  .tt-chk label{font-size:12px;cursor:pointer;color:#1E293B;}
  .tt-add{width:100%;padding:8px;border-radius:9px;border:none;background:var(--blue);color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 2px 8px rgba(30,64,175,.2);}
  .tt-add:hover{background:var(--blue-light);}
  .tt-add:disabled{opacity:.4;cursor:not-allowed;}
  .tt-lhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
  .tt-ltitle{font-size:12px;font-weight:700;color:#fff;display:flex;align-items:center;gap:4px;text-shadow:0 1px 3px rgba(0,0,0,.3);}
  .tt-cnt{background:rgba(255,255,255,.2);color:#fff;border-radius:20px;padding:1px 7px;font-size:10px;font-weight:700;}
  .tt-wsum{font-size:11px;font-weight:700;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);padding:2px 8px;border-radius:20px;}
  .tt-entries-wrap{margin-top:4px;}
  .tt-entries-header{display:grid;grid-template-columns:110px 55px 1fr 1fr auto;align-items:center;gap:4px;padding:2px 8px 3px;font-size:10px;font-weight:700;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid rgba(255,255,255,.15);margin-bottom:3px;}
  .tt-entry-sm{background:rgba(255,255,255,0.9);border:0.5px solid rgba(255,255,255,.4);border-radius:6px;padding:4px 8px;margin-bottom:3px;display:grid;grid-template-columns:110px 55px 1fr 1fr auto;align-items:center;gap:4px;font-size:11px;}
  .tt-entry-sm:hover{border-color:rgba(99,147,255,.5);background:rgba(255,255,255,.97);}
  .tt-esm-time{font-family:monospace;font-size:11px;font-weight:800;color:var(--blue);direction:ltr;white-space:nowrap;}
  .tt-esm-h{font-weight:800;color:var(--blue);font-size:12px;text-align:center;}
  .tt-esm-cli{font-size:11px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .tt-esm-wt{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .tt-del{background:transparent;border:none;color:rgba(220,38,38,0.6);width:16px;height:16px;border-radius:4px;cursor:pointer;font-size:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .tt-del:hover{background:var(--red-bg);color:var(--red);}
  .tt-empty{text-align:center;padding:18px;color:rgba(255,255,255,.7);font-size:12px;background:rgba(255,255,255,.08);border:1px dashed rgba(255,255,255,.2);border-radius:9px;}
  .tt-month-pick{position:relative;display:inline-block;}
  .tt-month-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;padding:3px 10px;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
  .tt-month-btn:hover{background:rgba(255,255,255,.25);}
  .tt-month-dd{position:absolute;top:100%;right:0;margin-top:4px;background:rgba(15,23,42,0.95);border:1px solid rgba(255,255,255,.2);border-radius:10px;padding:6px;z-index:50;min-width:160px;backdrop-filter:blur(12px);box-shadow:0 8px 24px rgba(0,0,0,.4);}
  .tt-month-dd div{padding:7px 12px;border-radius:6px;color:rgba(255,255,255,.8);font-size:13px;cursor:pointer;font-weight:600;text-align:right;}
  .tt-month-dd div:hover{background:rgba(255,255,255,.15);color:#fff;}
  .tt-month-dd div.on{background:var(--blue);color:#fff;}
  .tt-gaps-section{margin-top:12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:10px 12px;}
  .tt-gaps-title{font-size:14px;font-weight:700;color:#fbbf24;margin-bottom:8px;display:flex;align-items:center;gap:5px;}
  .tt-gap-row{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;border-radius:7px;cursor:pointer;color:rgba(255,255,255,.8);font-size:13px;transition:background .15s;}
  .tt-gap-row:hover{background:rgba(255,255,255,.1);}
  .tt-gap-row .gap-date{font-weight:700;color:#fff;}
  .tt-gap-row .gap-hrs{font-weight:800;color:#fbbf24;}
  #tt-stats-inline{transition:all .2s;}
  .tt-stats{background:rgba(8,18,55,0.5);border:1px solid rgba(99,147,255,0.3);border-radius:10px;padding:10px;height:100%;}
  .tt-stats-header{margin-bottom:6px;}
  .tt-stats-title{font-size:10px;font-weight:700;color:rgba(255,255,255,.95);line-height:1.3;word-break:break-word;}
  .tt-stats-total-badge{display:inline-block;background:rgba(59,130,246,0.4);border:1px solid rgba(99,147,255,0.4);border-radius:6px;padding:2px 7px;font-size:13px;font-weight:800;color:#fff;margin-top:4px;}
  .tt-stats-months-bars{display:flex;gap:6px;align-items:flex-end;height:90px;margin-top:8px;}
  .tt-stats-month{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;min-width:0;}
  .tt-stats-month-bar{width:100%;border-radius:3px 3px 0 0;min-height:2px;}
  .tt-stats-month .sm-val{font-size:11px;font-weight:700;color:#93c5fd;margin-top:3px;line-height:1;text-align:center;}
  .tt-stats-month .sm-lbl{font-size:10px;color:rgba(255,255,255,.5);margin-top:2px;line-height:1;text-align:center;}
  .tt-login{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;padding:20px;}
  .tt-lbox{background:rgba(255,255,255,0.97);border:1px solid rgba(255,255,255,.5);border-radius:20px;padding:28px;width:300px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.2);}
  .tt-lico{font-size:34px;margin-bottom:8px;}
  .tt-lttl{font-size:18px;font-weight:800;color:var(--dark);margin-bottom:4px;}
  .tt-lsub{color:var(--muted);font-size:12px;margin-bottom:14px;}
  .tt-emplist{display:flex;flex-direction:column;gap:5px;max-height:240px;overflow-y:auto;margin-bottom:10px;}
  .tt-ebtn{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px 11px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;text-align:right;display:flex;align-items:center;gap:7px;width:100%;}
  .tt-ebtn:hover{border-color:var(--blue-light);background:var(--blue-pale);}
  .tt-eav{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--blue-light));display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0;color:#fff;}
  .tt-pass{width:100%;background:var(--surface);border:2px solid var(--border);color:var(--blue);padding:9px;border-radius:9px;font-size:20px;font-weight:800;text-align:center;letter-spacing:6px;font-family:inherit;direction:ltr;margin:8px 0;}
  .tt-pass:focus{outline:none;border-color:var(--blue-light);}

function ttDefaultSettings(){return{remindArrive:{enabled:true,time:"09:15"},remindLeave:{enabled:true,time:"17:30"},remindLeave2:{enabled:true,time:"18:30"},longWork:{enabled:false,hours:4}};}
function ttGetSettings(){const k=ttSettingsKey();if(!k)return ttDefaultSettings();try{const s=JSON.parse(localStorage.getItem(k)||"null");return Object.assign(ttDefaultSettings(),s||{});}catch{return ttDefaultSettings();}}
function ttSaveSettings(s){const k=ttSettingsKey();if(!k)return;try{localStorage.setItem(k,JSON.stringify(s));}catch{}}
function ttRemFiredKey(date){return ttCurEmp?`tt_remfired_${ttCurEmp.id}_${date}`:null;}
function ttGetRemFired(date){const k=ttRemFiredKey(date);if(!k)return{arrive:false,leave:false,leave2:false};try{return Object.assign({arrive:false,leave:false,leave2:false},JSON.parse(localStorage.getItem(k)||"{}"));}catch{return{arrive:false,leave:false,leave2:false};}}
function ttSetRemFired(date,obj){const k=ttRemFiredKey(date);if(!k)return;try{localStorage.setItem(k,JSON.stringify(obj));}catch{}}
function ttFireNotif(title,body){
  try{
    if(typeof Notification==="undefined")return;
    if(Notification.permission==="granted"){new Notification(title,{body,silent:false});}
    else if(Notification.permission!=="denied"){Notification.requestPermission().then(p=>{if(p==="granted")new Notification(title,{body});});}
  }catch(e){}
}
function ttCheckReminders(){
  if(!ttCurEmp)return;
  const now=new Date();const day=now.getDay();
  if(day===5||day===6)return;
  const hhmm=`${ttPad(now.getHours())}:${ttPad(now.getMinutes())}`;
  const today=ttToday();const s=ttGetSettings();const fired=ttGetRemFired(today);const ds=ttDays[today]||{};
  if(s.remindArrive.enabled&&hhmm===s.remindArrive.time&&!ds.arrive&&!fired.arrive){
    ttFireNotif("⏰ שכחת להיכנס?","לא הוקלדה שעת כניסה לעבודה היום");fired.arrive=true;ttSetRemFired(today,fired);
  }
  if(s.remindLeave.enabled&&hhmm===s.remindLeave.time&&!ds.leave&&!fired.leave){
    ttFireNotif("🔔 סיום יום עבודה","האם הוקלדה שעת יציאה?");fired.leave=true;ttSetRemFired(today,fired);
  }
  if(s.remindLeave2.enabled&&hhmm===s.remindLeave2.time&&!ds.leave&&!fired.leave2){
    ttFireNotif("⚠️ שעת יציאה חסרה","עדיין לא דווחה שעת יציאה להיום");fired.leave2=true;ttSetRemFired(today,fired);
  }
}
function ttStartReminderEngine(){
  if(ttReminderInterval)clearInterval(ttReminderInterval);
  try{if(typeof Notification!=="undefined"&&Notification.permission==="default")Notification.requestPermission();}catch{}
  ttCheckReminders();ttReminderInterval=setInterval(ttCheckReminders,60*1000);
}
function ttStopReminderEngine(){if(ttReminderInterval)clearInterval(ttReminderInterval);ttReminderInterval=null;}

// ── API ───────────────────────────────────────────────────────
async function ttGet(table,filter,fieldIds){
  let all=[],offset=null;
  do{
    // Retry transient failures (5xx, 429, network): Airtable occasionally returns
    // bogus 4xx/5xx under load. 4xx client errors (except 429) do not retry.
    let resp, lastErr;
    for(let attempt=0; attempt<3; attempt++){
      try{
        const _tok=localStorage.getItem('lbcpa_token');
        const _hdrs={'Content-Type':'application/json'};if(_tok)_hdrs['Authorization']='Bearer '+_tok;
        resp=await fetch(PROXY_URL,{method:'POST',headers:_hdrs,body:JSON.stringify({action:'get',table,filter:filter||'',fields:fieldIds||[],offset})});
        if(resp.ok)break;
        if(resp.status>=500||resp.status===429){lastErr=new Error('Airtable error '+resp.status);await new Promise(r=>setTimeout(r,400*(attempt+1)));continue;}
        if(resp.status===401){ttHandleExpiredSession();return[];}
        throw new Error('Airtable error '+resp.status);
      }catch(e){lastErr=e;if(attempt<2){await new Promise(r=>setTimeout(r,400*(attempt+1)));continue;}throw e;}
    }
    if(!resp||!resp.ok)throw lastErr||new Error('Airtable error');
    const j=await resp.json();
    if(j.error)throw new Error(j.error);
    all=all.concat(j.records||[]);offset=j.offset||null;
  }while(offset);
  return all;
}
async function ttPost(table,fields){
  const _tok=localStorage.getItem('lbcpa_token');const _hdrs={'Content-Type':'application/json'};if(_tok)_hdrs['Authorization']='Bearer '+_tok;
  const resp=await fetch(PROXY_URL,{method:'POST',headers:_hdrs,body:JSON.stringify({action:'post',table,data:fields})});
  if(!resp.ok)throw new Error('Airtable error '+resp.status);
  const j=await resp.json();if(j.error)throw new Error(j.error);return j;
}
async function ttPatch(table,id,fields){
  const _tok=localStorage.getItem('lbcpa_token');const _hdrs={'Content-Type':'application/json'};if(_tok)_hdrs['Authorization']='Bearer '+_tok;
  const resp=await fetch(PROXY_URL,{method:'POST',headers:_hdrs,body:JSON.stringify({action:'patch',table,id,data:fields})});
  if(!resp.ok)throw new Error('Airtable error '+resp.status);
  const j=await resp.json();if(j.error)throw new Error(j.error);return j;
}
async function ttDel(table,id){
  const _tok=localStorage.getItem('lbcpa_token');const _hdrs={'Content-Type':'application/json'};if(_tok)_hdrs['Authorization']='Bearer '+_tok;
  const resp=await fetch(PROXY_URL,{method:'POST',headers:_hdrs,body:JSON.stringify({action:'delete',table,id})});
  if(!resp.ok)throw new Error('Airtable error '+resp.status);
  const j=await resp.json();if(j.error)throw new Error(j.error);return j;
}

async function ttLoadEmps(){
  ttRoot().innerHTML=`<div class="tt-loader"><span class="tt-sp" style="width:20px;height:20px;border-width:3px"></span><span>טוען עובדים...</span></div>`;
  try{
    const[recs,holRecs]=await Promise.all([
      ttGet(TABLES.employees,"",[FE.fullName,FE.status,FE.hideFromTT,FE.dailyHours,FE.role]),
      ttGet(TABLES.holidays,"",[FH.date,FH.name])
    ]);
    ttHolidays=holRecs.map(r=>({id:r.id,date:r.fields[FH.date]||"",name:r.fields[FH.name]||""})).filter(h=>h.date);
    ttEmps=recs.filter(r=>{const st=r.fields[FE.status];const active=(st&&typeof st==="object"?st.name:st)==="פעיל";return active&&!r.fields[FE.hideFromTT];})
      .sort((a,b)=>(a.fields[FE.fullName]||"").localeCompare(b.fields[FE.fullName]||"","he"));
    // Fade out splash
    const splash=document.getElementById("tt-splash");
    if(splash){splash.classList.add("fade-out");setTimeout(()=>splash.remove(),400);}
    // Auto-login: match logged-in user by record ID, then name fallback
    // Try empId from localStorage (set by ttFinishLogin) or from stored JWT
    let jwtEmpId=localStorage.getItem('lbcpa_emp_id')||null;
    if(!jwtEmpId){const storedToken=localStorage.getItem('lbcpa_token');if(storedToken){try{const pl=JSON.parse(atob(storedToken.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));jwtEmpId=pl.empId||null;}catch(e){}}}
    let match=jwtEmpId?ttEmps.find(e=>e.id===jwtEmpId):null;
    if(!match){
      const norm=s=>String(s||"").replace(/\s+/g," ").trim();
      const mainName=localStorage.getItem('lbcpa_name')||sessionStorage.getItem('lbcpa_name')||localStorage.getItem('lbcpa_user')||sessionStorage.getItem('lbcpa_user');
      if(mainName){
        const target=norm(mainName);const parts=target.split(" ").filter(Boolean);
        match=ttEmps.find(e=>norm(e.fields[FE.fullName])===target);
        if(!match&&parts.length)match=ttEmps.find(e=>norm(e.fields[FE.fullName])===parts[0]);
        if(!match&&parts.length)match=ttEmps.find(e=>parts.every(p=>norm(e.fields[FE.fullName]).includes(p)));
        if(!match&&parts.length)match=ttEmps.find(e=>norm(e.fields[FE.fullName]).split(" ")[0]===parts[0]);
      }
    }
    if(match){
      ttSelEmp=match;ttCurEmp=match;
      ttRoot().innerHTML=`<div class="tt-loader"><span class="tt-sp" style="width:20px;height:20px;border-width:3px"></span><span>טוען נתונים...</span></div>`;
      ttLoadData();
      return;
    }
    ttRenderLogin();
  }catch(e){
    const splash=document.getElementById("tt-splash");if(splash)splash.remove();
    if(e.message&&e.message.includes('401')){ttRenderLogin();return;}
    ttRoot().innerHTML=`<div class="tt-loader" style="color:#fca5a5">שגיאה: ${e.message}</div>`;
  }
}

  ttRenderLogin();
}

window.ttSubmitCreds=async function(){
  const email=(document.getElementById("tt-otp-email")?.value||"").trim().toLowerCase();
  const password=document.getElementById("tt-otp-pass")?.value||"";
  const perr=document.getElementById("tt-perr");
  if(!email||!password){if(perr)perr.textContent="יש למלא מייל וסיסמה";return;}
  const btn=document.getElementById("tt-otp-submit");if(btn){btn.disabled=true;btn.textContent="שולח...";}
  try{
    const deviceToken=localStorage.getItem("lbcpa_device_token")||null;
    const body={email,password};if(deviceToken)body.deviceToken=deviceToken;
    const res=await fetch(`${AUTH_BASE}/auth-login`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    const data=await res.json();
    if(!res.ok){if(perr)perr.textContent=data.error||"שגיאה";return;}
    _ttOtpEmail=email;
    if(data.skipOtp){ttFinishLogin(data);return;}
    if(deviceToken)localStorage.removeItem("lbcpa_device_token");
    ttRenderOtpStage(data.name||"");
  }catch(e){if(perr)perr.textContent="שגיאת רשת, נסה שוב";}
  finally{if(btn){btn.disabled=false;btn.textContent="כניסה ←";}}
};

function ttRenderOtpStage(firstName){
  const stage=document.getElementById("tt-otp-stage");if(!stage)return;
  stage.innerHTML=`
    <div style="margin-top:8px;font-size:13px;color:var(--muted)">${firstName?"שלום "+firstName+", ":""}קוד אימות נשלח למייל</div>

    </div>
    <div class="tt-perr" id="tt-perr" style="margin-top:8px"></div>

  setTimeout(()=>{const p=document.getElementById("tt-otp-code");if(p)p.focus();},80);
  setTimeout(()=>{
    const c=document.getElementById("tt-otp-code");
    if(c)c.addEventListener("keydown",ev=>{if(ev.key==="Enter"){ev.preventDefault();ttSubmitOtp();}});

window.ttSubmitOtp=async function(){
  const otp=(document.getElementById("tt-otp-code")?.value||"").trim();
  const perr=document.getElementById("tt-perr");
  if(otp.length!==6){if(perr)perr.textContent="יש להזין קוד בן 6 ספרות";return;}
  const btn=document.getElementById("tt-otp-submit");if(btn){btn.disabled=true;btn.textContent="מאמת...";}
  try{
    const res=await fetch(`${AUTH_BASE}/auth-verify`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:_ttOtpEmail,otp,trust:true})});
    const data=await res.json();
    if(!res.ok){if(perr)perr.textContent=data.error||"קוד שגוי";return;}
    ttFinishLogin(data);
  }catch(e){if(perr)perr.textContent="שגיאת רשת, נסה שוב";}
  finally{if(btn){btn.disabled=false;btn.textContent="אמת קוד ←";}}
};

function ttFinishLogin(data){
  localStorage.setItem("lbcpa_auth","1");
  localStorage.setItem("lbcpa_name",data.name||"");
  if(data.token)localStorage.setItem("lbcpa_token",data.token);
  if(data.deviceToken)localStorage.setItem("lbcpa_device_token",data.deviceToken);
  if(data.empId)localStorage.setItem("lbcpa_emp_id",data.empId);
  const ttlMs=data.expiresIn?data.expiresIn*1000:14*24*60*60*1000;
  localStorage.setItem("lbcpa_auth_expires",String(Date.now()+ttlMs));
  // Re-fetch employees (now with valid JWT) — the initial load failed without auth.
  // ttLoadEmps will auto-login using empId from localStorage.
  ttLoadEmps();
}

// ── LOAD DATA ─────────────────────────────────────────────────
async function ttLoadData(){
  try{
    const ago=new Date();ago.setDate(ago.getDate()-180);const agoStr=ago.toISOString().slice(0,10);
    const empId=ttCurEmp.id;const empName=(ttCurEmp.fields[FE.fullName]||"").replace(/'/g,"\\'");
    let[cls,wts,attR,wrkR]=await Promise.all([
      ttGet(TABLES.clients,`{${FC.name}}!=''`,[FC.name,FC.blocked]),
      ttGet(TABLES.workTypes,`{${FW.active}}='פעיל'`,[FW.name,FW.allowedRoles]),
      ttGet(TABLES.attendance,`IS_AFTER({${FA.date}},'${agoStr}')`,[FA.employee,FA.date,FA.startTime,FA.endTime]),
      ttGet(TABLES.workEntries,`AND(IS_AFTER({${FT.date}},'${agoStr}'),FIND('${empName}',ARRAYJOIN({${FT.employee}})))`,[FT.employee,FT.client,FT.workType,FT.startTime,FT.endTime,FT.hours,FT.notes,FT.billable,FT.date]),
    ]);
    console.log("[tt] loaded",wrkR.length,"work entries for",empName,"| empId:",empId);
    ttClients=cls.sort((a,b)=>(a.fields[FC.name]||"").localeCompare(b.fields[FC.name]||"","he"));
    ttWorkTypes=wts.sort((a,b)=>(a.fields[FW.name]||"").localeCompare(b.fields[FW.name]||"","he"));
    ttDays={};
    attR=attR.filter(r=>(r.fields[FA.employee]||[]).includes(empId));
    wrkR=wrkR.filter(r=>(r.fields[FT.employee]||[]).includes(empId));
    console.log("[tt] after emp filter:",wrkR.length,"entries | ttDays dates will be:",wrkR.map(r=>r.fields[FT.date]||"no-date").slice(0,5));
    attR.forEach(r=>{const date=(r.fields[FA.date]||"").slice(0,10);if(!date)return;if(!ttDays[date])ttDays[date]={attendId:null,arrive:"",leave:"",entries:[]};ttDays[date].attendId=r.id;ttDays[date].arrive=ttITime(r.fields[FA.startTime]);ttDays[date].leave=ttITime(r.fields[FA.endTime]);});
    wrkR.forEach(r=>{const date=r.fields[FT.date]?r.fields[FT.date].slice(0,10):r.fields[FT.startTime]?ttIDate(r.fields[FT.startTime]):null;if(!date)return;if(!ttDays[date])ttDays[date]={attendId:null,arrive:"",leave:"",entries:[]};const sISO=r.fields[FT.startTime],eISO=r.fields[FT.endTime];const startT=sISO?ttITime(sISO):"",endT=eISO?ttITime(eISO):"";const sm=ttT2m(startT),em=ttT2m(endT);ttDays[date].entries.push({id:r.id,clientId:(r.fields[FT.client]||[])[0]||"",workTypeId:(r.fields[FT.workType]||[])[0]||"",start:startT,end:endT,notes:r.fields[FT.notes]||"",hours:r.fields[FT.hours]||(em>sm?(em-sm)/60:0)});});
    Object.values(ttDays).forEach(d=>d.entries.sort((a,b)=>a.start.localeCompare(b.start)));
    // Restore in-progress entry draft from a previous browser session
    const draft=ttLoadDraftFromStorage();
    if(draft&&draft.date){
      ttDraft=draft;ttSelDate=draft.date;
      if(draft.start)ttTimeVals.start=draft.start;
    }
    ttRenderMain();
    ttStartReminderEngine();
    if(draft&&draft.date)setTimeout(()=>ttToast("✓ שוחזר דיווח שהתחלת בעבר"),250);
  }catch(e){ttRoot().innerHTML=`<div class="tt-loader" style="color:#fca5a5">שגיאה: ${e.message}</div>`;}
}

function ttIsManager(){
  const r=ttCurEmp?.fields?.[FE.role];

// ── DATE PICKER ───────────────────────────────────────────────
window.ttOpenDatePicker=function(){
  const today=ttToday();let vy=+ttSelDate.slice(0,4),vm=+ttSelDate.slice(5,7)-1;
  function render(){
    document.getElementById("tt-dp")?.remove();
    const dp=document.createElement("div");dp.id="tt-dp";dp.className="tt-datepicker";dp.onclick=e=>{if(e.target===dp)dp.remove();};
    const mN=["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];
    const dH=["א'","ב'","ג'","ד'","ה'","ו'","ש'"];
    const first=new Date(vy,vm,1).getDay();const dim=new Date(vy,vm+1,0).getDate();
    let cells=dH.map(d=>`<div class="tt-dp-hdr">${d}</div>`).join("");
    for(let i=0;i<first;i++)cells+=`<div></div>`;
    for(let d=1;d<=dim;d++){
      const ds=`${vy}-${ttPad(vm+1)}-${ttPad(d)}`;const isFut=ds>today;const isLock=ttIsDateLocked(ds);
      let cls="tt-dp-day";if(ds===today)cls+=" today";if(ds===ttSelDate)cls+=" selected";if(isFut)cls+=" future";if(isLock)cls+=" locked";
      cells+=`<div class="${cls}" ${(isFut||isLock)?"":"onclick=\"ttPickDate('"+ds+"')\""} ${isLock?'title="נעול לעריכה"':''}>${d}${isLock?'🔒':''}</div>`;
    }
    dp.innerHTML=`<div class="tt-dp-box"><div class="tt-dp-head"><button class="tt-dp-nav" onclick="ttDPNav(-1)">›</button><div class="tt-dp-title">${mN[vm]} ${vy}</div><button class="tt-dp-nav" onclick="ttDPNav(1)">‹</button></div><div class="tt-dp-grid">${cells}</div></div>`;
    document.body.appendChild(dp);
  }
  window.ttDPNav=d=>{vm+=d;if(vm>11){vm=0;vy++;}if(vm<0){vm=11;vy--;}render();};
  window.ttPickDate=d=>{if(ttIsDateLocked(d)){ttToast("🔒 תאריך נעול לעריכה",true);return;}ttSelDate=d;document.getElementById("tt-dp")?.remove();ttTimeVals={arrive:"",leave:"",start:"",end:""};ttStopTimer();ttRenderDay();};
  render();
};

// ── PREV DAY CHECK ────────────────────────────────────────────
function ttCheckPrevDayLeave(){
  for(let i=1;i<=14;i++){const dt=new Date(ttSelDate+"T12:00:00");dt.setDate(dt.getDate()-i);const ds=`${dt.getFullYear()}-${ttPad(dt.getMonth()+1)}-${ttPad(dt.getDate())}`;const prev=ttDays[ds];if(!prev)continue;const hasArrive=prev.arrive&&ttV(prev.arrive);if(hasArrive&&!prev.leave)return`<div class="tt-alert warn">⚠️ ביום <strong>${ttDLbl(ds)}</strong> לא הוזנה שעת יציאה. יש לסגור את יום העבודה הקודם לפני הזנת כניסה חדשה.<button onclick="ttGoToDate('${ds}')" style="margin-right:8px;background:var(--yellow);border:none;color:#fff;padding:3px 10px;border-radius:5px;cursor:pointer;font-size:11px;font-weight:700;">מעבר ליום →</button></div>`;if(hasArrive&&prev.leave)break;}
  return"";
}
window.ttGoToDate=function(ds){ttSelDate=ds;ttTimeVals={arrive:"",leave:"",start:"",end:""};ttStopTimer();ttRenderDay();};

// ── DAY VIEW ─────────────────────────────────────────────────
function ttRenderDay(){
  ttStopTimer();
  const today=ttToday();const isLocked=ttIsDateLocked(ttSelDate);
  const d=ttGetDay(ttSelDate);
  ttTimeVals.arrive=d.arrive||"";ttTimeVals.leave=d.leave||"";
  const attH=(d.arrive&&d.leave&&ttV(d.arrive)&&ttV(d.leave))?Math.max(0,(ttT2m(d.leave)-ttT2m(d.arrive))/60):0;
  const workH=d.entries.reduce((s,e)=>{const m=ttT2m(e.end)-ttT2m(e.start);return s+(m>0?m/60:0);},0);
  const gap=attH-workH;
  const alertHTML=(attH>0&&workH>0&&gap>0.25)?`<div class="tt-alert warn">⚠️ פער של <strong style="margin:0 3px">${ttFmtH(gap)}</strong> שע'</div>`:(attH>0&&workH>0&&gap<=0.25)?`<div class="tt-alert ok">✓ כל שעות הנוכחות מוסברות</div>`:"";
  const lastEnd=d.entries.length>0?d.entries[d.entries.length-1].end:"";
  // Restore unsaved entry draft for this day (persisted across browser sessions)
  const draftForDay=(ttDraft&&ttDraft.date===ttSelDate)?ttDraft:null;
  if(draftForDay&&!ttTimeVals.start&&draftForDay.start)ttTimeVals.start=draftForDay.start;
  const defStart=ttTimeVals.start||draftForDay?.start||(ttV(lastEnd)?lastEnd:"");if(defStart&&ttV(defStart))ttTimeVals.start=defStart;
  const draftCli=draftForDay?.cliId||"";
  const draftWt=draftForDay?.wtId||"";
  const draftNotes=(draftForDay?.notes||"").replace(/"/g,"&quot;");
  const draftBill=draftForDay?draftForDay.bill!==false:true;
  const cliOpts=ttClients.map(c=>{const bl=ttIsClientBlocked(c.id);return`<option value="${c.id}"${bl?' data-blocked="true"':''}${c.id===draftCli?' selected':''}>${bl?'🔒 ':''} ${c.fields[FC.name]||""}</option>`;}).join("");
  const empRole=ttCurEmp.fields[FE.role];const empRoleName=empRole&&typeof empRole==="object"?empRole.name:empRole;
  const filteredWt=ttWorkTypes.filter(w=>{const allowed=w.fields[FW.allowedRoles];if(!allowed||!allowed.length)return true;return allowed.some(r=>(typeof r==="object"?r.name:r)===empRoleName);});
  const wtOpts=filteredWt.map(w=>`<option value="${w.id}"${w.id===draftWt?' selected':''}>${w.fields[FW.name]||""}</option>`).join("");
  const prevWarn=(!isLocked)?ttCheckPrevDayLeave():"";
  const arriveBlocked=!!prevWarn;
  const dlbl=ttDLbl(ttSelDate)+(ttSelDate===today?` <span class="tt-today">היום</span>`:"")+(isLocked?` <span class="tt-today" style="background:rgba(220,38,38,.4);border-color:rgba(220,38,38,.5)">🔒 נעול</span>`:"");
  let entriesHTML=d.entries.length===0?`<div class="tt-empty">עדיין לא נוספו דיווחים היום</div>`:
    `<div class="tt-entries-wrap"><div class="tt-entries-header"><span>שעות</span><span style="text-align:center">סה"כ</span><span>לקוח</span><span>סוג עבודה</span><span></span></div>${
      d.entries.map(e=>{const mm=ttT2m(e.end)-ttT2m(e.start);const h=mm>0?ttFmtH(mm/60):"—";const cn=ttClients.find(c=>c.id===e.clientId)?.fields[FC.name]||"";const wn=ttWorkTypes.find(w=>w.id===e.workTypeId)?.fields[FW.name]||"";
        return`<div class="tt-entry-sm"><span class="tt-esm-time">${e.start}–${e.end}</span><span class="tt-esm-h">${h}</span><span class="tt-esm-cli">${cn}</span><span class="tt-esm-wt">${wn}</span>${!isLocked?`<button class="tt-del" onclick="ttDelEntry('${e.id}','${ttSelDate}')">✕</button>`:`<span style="font-size:11px;opacity:.4">🔒</span>`}</div>`;
      }).join("")
    }</div>`;
  const showTimer=defStart&&ttV(defStart)&&!isLocked;
  const panel=document.getElementById("tt-panel-day");if(!panel)return;
  panel.innerHTML=`
    <div class="tt-dbar">
      <div class="tt-dlbl" onclick="ttOpenDatePicker()">${dlbl} 📆</div>
      <div class="tt-nav"><button onclick="ttChangeDay(-1)">‹</button><button onclick="ttChangeDay(1)" ${ttSelDate>=today?"disabled":""}>›</button></div>
    </div>
    ${isLocked?`<div class="tt-alert err">🔒 תאריך זה נעול על ידי המנהל — לא ניתן לערוך</div>`:""}
    ${prevWarn}
    <div class="tt-att">
      <div class="tt-att-top"><div class="tt-att-title">🏢 נוכחות</div>${attH>0?`<div class="tt-att-sum">סה"כ: <span>${ttFmtH(attH)}</span> שע'</div>`:""}</div>
      <div class="tt-att-row">
        <div class="tt-afield"><label>כניסה לעבודה</label>
          <div style="display:flex;gap:5px;align-items:center">
            <input type="text" inputmode="numeric" maxlength="5" placeholder="HH:MM" id="tt-arr" class="tt-tbox${d.arrive?" set":""}" value="${d.arrive||""}" autocomplete="off" style="flex:1" oninput="ttOnTime(this,'arrive')" ondblclick="ttSetNow('arrive')" ${(arriveBlocked||isLocked)?'disabled':''}/>
            ${(!isLocked&&d.arrive&&!d.leave)?`<button class="tt-del" onclick="ttClearArrive()" title="איפוס שעת כניסה" style="width:38px;height:38px;font-size:14px">✕</button>`:''}
          </div>
          ${isLocked?'<div class="tt-dbl">🔒 נעול</div>':(d.arrive&&!d.leave)?'<div class="tt-dbl">לחץ ✕ לאיפוס אם נרשם בטעות</div>':''}</div>
        <div class="tt-afield"><label>יציאה מעבודה</label>
          <div style="display:flex;gap:5px;align-items:center">
            <input type="text" inputmode="numeric" maxlength="5" placeholder="HH:MM" id="tt-lv" class="tt-tbox${d.leave?" set":""}" value="${d.leave||""}" autocomplete="off" style="flex:1" oninput="ttOnTime(this,'leave')" ondblclick="ttSetNow('leave')" ${isLocked?'disabled':''}/>
            ${!isLocked?`<button class="tt-save-btn" onclick="ttSaveLeave()">שמור</button>`:""}
          </div>
          ${isLocked?'<div class="tt-dbl">🔒 נעול</div>':''}</div>
      </div>
    </div>
    ${alertHTML}
    ${!isLocked?`<div style="display:flex;gap:10px;align-items:flex-start">
      <div class="tt-form" style="flex:1;min-width:0">
        <div class="tt-ftitle">➕ הוסף דיווח עבודה</div>
        <div class="tt-r2">
          <div><label class="tt-fl">לקוח *</label><select class="tt-fs" id="tt-cli" onchange="ttOnCliChange();ttSaveDraft()" autocomplete="off"><option value="">— בחר לקוח —</option>${cliOpts}</select></div>
          <div><label class="tt-fl">סוג עבודה *</label><select class="tt-fs" id="tt-wt" onchange="ttOnSelChange();ttSaveDraft()" autocomplete="off"><option value="">— בחר —</option>${wtOpts}</select></div>
        </div>
        <div class="tt-r2">
          <div><label class="tt-fl">שעת התחלה *</label><input type="text" inputmode="numeric" maxlength="5" placeholder="HH:MM" id="tt-st" class="tt-fi tt-tfi" value="${defStart}" autocomplete="off" oninput="ttOnTime(this,'start');ttOnStartChange();ttSaveDraft()" ondblclick="ttSetNow('start')"/></div>
          <div><label class="tt-fl">שעת סיום *</label><input type="text" inputmode="numeric" maxlength="5" placeholder="HH:MM" id="tt-en" class="tt-fi tt-tfi" autocomplete="off" oninput="ttOnTime(this,'end')" ondblclick="ttSetNow('end')"/></div>
        </div>
        <div id="tt-dur"></div>
        <div class="tt-notes-row"><div class="tt-fg" style="flex:1;margin-bottom:0"><label class="tt-fl">הערות</label><input class="tt-fi" type="text" id="tt-notes" placeholder="תיאור קצר..." value="${draftNotes}" oninput="ttSaveDraft()" autocomplete="off"/></div><div id="tt-timer-wrap">${showTimer?`<div class="tt-timer"><span class="tt-timer-dot"></span><span id="tt-timer-val">00:00:00</span></div>`:""}</div></div>
        <div class="tt-chk"><input type="checkbox" id="tt-bill" ${draftBill?'checked':''} onchange="ttSaveDraft()"/><label for="tt-bill">לחיוב לקוח</label></div>
        <button class="tt-add" id="tt-addbtn" onclick="ttAddEntry()">💾 שמור דיווח</button>
      </div>
    </div>`:""}
    <div id="tt-stats-inline"></div>
    <div class="tt-lhead">
      <div class="tt-ltitle">📋 עבודות היום <span class="tt-cnt">${d.entries.length}</span></div>
      ${workH>0?`<div class="tt-wsum">${ttFmtH(workH)} שעות</div>`:""}
    </div>
    ${entriesHTML}
    ${ttBuildGapDays()}`;
  if(showTimer)setTimeout(()=>ttStartTimer(defStart),30);
  if(draftForDay&&(draftCli||draftWt))setTimeout(()=>ttRenderStats(draftCli,draftWt),30);
}

window.ttOnCliChange=function(){
  const cId=document.getElementById("tt-cli")?.value;
  if(cId&&ttIsClientBlocked(cId)){const cName=ttClients.find(c=>c.id===cId)?.fields[FC.name]||"לקוח";ttShowClientBlocked(cName);}

// ── TIME INPUT ────────────────────────────────────────────────
window.ttOnTime=function(el,field){
  const digits=el.value.replace(/\D/g,"").slice(0,4);const fmt=digits.length>2?digits.slice(0,2)+":"+digits.slice(2):digits;el.value=fmt;
  if(ttV(fmt)){
    ttTimeVals[field]=fmt;
    if(field==="arrive"){const lv=ttTimeVals.leave||ttGetDay(ttSelDate).leave;if(lv&&ttV(lv)&&ttT2m(fmt)>=ttT2m(lv)){ttToast("⚠️ שעת כניסה חייבת להיות לפני שעת היציאה",true);setTimeout(()=>{el.value="";ttTimeVals.arrive="";el.classList.remove("set");},80);return;}el.classList.add("set");ttSaveAtt("arrive",fmt);}
    if(field==="leave"){const av=ttTimeVals.arrive||ttGetDay(ttSelDate).arrive;if(av&&ttV(av)&&ttT2m(fmt)<=ttT2m(av)){ttToast("⚠️ שעת יציאה חייבת להיות אחרי שעת הכניסה",true);setTimeout(()=>{el.value="";ttTimeVals.leave="";},80);return;}}
    if(field==="start"||field==="end")ttUpdateDur();
  }else if(!fmt){

    // Clear arrive from Airtable when user deletes it
    if(field==="arrive"){
      const d=ttGetDay(ttSelDate);
      if(d.attendId){
        ttPatch(TABLES.attendance,d.attendId,{[FA.startTime]:null}).catch(()=>{});

// ── STATS SIDE PANEL ──────────────────────────────────────────
function ttRenderStats(clientId,workTypeId){
  const el=document.getElementById("tt-stats-inline");if(!el)return;
  if(!clientId||!workTypeId){el.innerHTML="";return;}
  const wtName=ttWorkTypes.find(w=>w.id===workTypeId)?.fields[FW.name]||"";
  const isMonthly=ttIsMonthlyType(wtName);
  const months={};const today=new Date();const last6=[];
  for(let i=5;i>=0;i--){const d=new Date(today.getFullYear(),today.getMonth()-i,1);const k=`${d.getFullYear()}-${ttPad(d.getMonth()+1)}`;months[k]=0;last6.push(k);}
  let total=0;
  Object.entries(ttDays).forEach(([date,day])=>{day.entries.forEach(e=>{if(e.clientId!==clientId||e.workTypeId!==workTypeId)return;const h=e.hours||Math.max(0,(ttT2m(e.end)-ttT2m(e.start))/60);total+=h;const mk=ttMonthKey(date);if(mk in months)months[mk]+=h;});});
  const cName=ttClients.find(c=>c.id===clientId)?.fields[FC.name]||"";
  if(isMonthly||total>0){
    const maxVal=Math.max(...Object.values(months),0.01);
    const bars=last6.map(k=>{const h=months[k]||0;const pct=(h/maxVal)*100;return`<div class="tt-stats-month"><div class="tt-stats-month-bar" style="height:${Math.max(pct,3)}%;background:${h>0?'rgba(59,130,246,0.7)':'rgba(255,255,255,0.1)'}"></div><span class="sm-val">${h>0?ttFmtH(h):"—"}</span><span class="sm-lbl">${ttMonthLabel(k)}</span></div>`;}).join("");
    el.innerHTML=`<div class="tt-stats" style="margin-bottom:10px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px"><div><div style="font-size:11px;font-weight:700;color:rgba(255,255,255,.5);text-transform:uppercase;margin-bottom:3px">היסטוריית שעות</div><div style="font-size:14px;font-weight:700;color:rgba(255,255,255,.95)">📊 ${wtName} | ${cName}</div></div><div class="tt-stats-total-badge" style="font-size:15px;padding:4px 12px">${ttFmtH(total)} שע' סה"כ</div></div><div class="tt-stats-months-bars" style="height:90px">${bars}</div></div>`;
  }else{el.innerHTML="";}
}

async function ttSaveAtt(field,value){

    if(d.attendId){const fm={arrive:FA.startTime,leave:FA.endTime};await ttPatch(TABLES.attendance,d.attendId,{[fm[field]]:ttISO(ttSelDate,value)});}
    else{const f={[FA.employee]:[ttCurEmp.id],[FA.date]:ttSelDate};if(field==="arrive")f[FA.startTime]=ttISO(ttSelDate,value);else f[FA.endTime]=ttISO(ttSelDate,value);const rec=await ttPost(TABLES.attendance,f);if(!ttDays[ttSelDate])ttDays[ttSelDate]={attendId:null,arrive:"",leave:"",entries:[]};ttDays[ttSelDate].attendId=rec.id;}
    if(!ttDays[ttSelDate])ttDays[ttSelDate]={attendId:null,arrive:"",leave:"",entries:[]};ttDays[ttSelDate][field]=value;
  }catch(e){ttToast("שגיאה: "+e.message,true);}

// Clear arrive time on a day that has arrive but no leave (clocked-in by mistake).
// Deletes the attendance record entirely if leave is also empty.
window.ttClearArrive=async function(){

  if(!d.arrive)return;

};

// ── ADD / DELETE ENTRY ────────────────────────────────────────
window.ttAddEntry=async function(){
  if(ttIsDateLocked(ttSelDate)){ttToast("🔒 תאריך נעול — לא ניתן להוסיף דיווחים",true);return;}
  const cId=document.getElementById("tt-cli")?.value;const wId=document.getElementById("tt-wt")?.value;
  if(cId&&ttIsClientBlocked(cId)){const cName=ttClients.find(c=>c.id===cId)?.fields[FC.name]||"לקוח";ttShowClientBlocked(cName);return;}
  const s=ttTimeVals.start,en=ttTimeVals.end;const notes=document.getElementById("tt-notes")?.value.trim()||"";const bill=document.getElementById("tt-bill")?.checked;
  if(!cId||!wId||!ttV(s)||!ttV(en))return;
  const m=ttT2m(en)-ttT2m(s);if(m<=0){ttToast("שעת הסיום חייבת להיות אחרי ההתחלה",true);return;}
  const d=ttGetDay(ttSelDate);const ov=d.entries.find(e=>{return ttT2m(s)<ttT2m(e.end)&&ttT2m(en)>ttT2m(e.start);});
  if(ov){const cn=ttClients.find(c=>c.id===ov.clientId)?.fields[FC.name]||"";ttToast(`❌ חפיפה עם "${cn}" (${ov.start}–${ov.end})`,true);return;}
  const btn=document.getElementById("tt-addbtn");if(btn){btn.disabled=true;btn.innerHTML='<span class="tt-sp"></span> שומר...';}
  try{
    const rec=await ttPost(TABLES.workEntries,{[FT.employee]:[ttCurEmp.id],[FT.client]:[cId],[FT.workType]:[wId],[FT.date]:ttSelDate,[FT.startTime]:ttISO(ttSelDate,s),[FT.endTime]:ttISO(ttSelDate,en),[FT.hours]:m/60,[FT.billable]:bill,...(notes?{[FT.notes]:notes}:{})});
    if(!ttDays[ttSelDate])ttDays[ttSelDate]={attendId:null,arrive:"",leave:"",entries:[]};
    ttDays[ttSelDate].entries.push({id:rec.id,clientId:cId,workTypeId:wId,start:s,end:en,notes,hours:m/60});
    ttDays[ttSelDate].entries.sort((a,b)=>a.start.localeCompare(b.start));
    ttTimeVals.start=en;ttTimeVals.end="";ttClearDraft();ttStopTimer();ttToast("✓ דיווח נשמר");ttRenderDay();
  }catch(e){ttToast("שגיאה: "+e.message,true);if(btn){btn.disabled=false;btn.textContent="💾 שמור דיווח";}}
};
window.ttDelEntry=async function(id,date){

function ttBuildGapDays(){
  const mk=ttMonthKey(ttSelDate);const days=ttGetMonthDays(mk);const today=ttToday();const gaps=[];
  days.forEach(ds=>{if(ds>today)return;const d=ttDays[ds];if(!d)return;
    let dAtt=0;if(d.arrive&&d.leave&&ttV(d.arrive)&&ttV(d.leave))dAtt=Math.max(0,(ttT2m(d.leave)-ttT2m(d.arrive))/60);
    let dWork=0;d.entries.forEach(e=>{const m=e.hours||Math.max(0,(ttT2m(e.end)-ttT2m(e.start))/60);dWork+=m;});
    if(dAtt>0&&dWork>0){const g=dAtt-dWork;if(g>0.25)gaps.push({date:ds,gap:g});}
  });
  if(gaps.length===0)return"";
  return`<div class="tt-gaps-section">
    <div class="tt-gaps-title">⚠️ ימים עם שעות לא מוסברות (${ttMonthLabel(mk)})</div>
    ${gaps.map(g=>`<div class="tt-gap-row" onclick="ttGoToDate('${g.date}')">
      <span class="gap-date">${ttDLblShort(g.date)}</span>
      <span class="gap-hrs">פער ${ttFmtH(g.gap)} שע'</span>
    </div>`).join("")}
  </div>`;
}

// ── EMPLOYEE DASHBOARD ────────────────────────────────────────
function ttRenderDash(){
  const panel=document.getElementById("tt-panel-dash");if(!panel)return;
  const today=new Date();
  if(!ttDashMonth)ttDashMonth=ttCurrentMonthKey();
  function getPeriodDays(p){const days=[];if(p==="week"){const d=new Date(today);const dow=d.getDay();d.setDate(d.getDate()+(dow===0?-6:1-dow));for(let i=0;i<7;i++){const dd=new Date(d);dd.setDate(d.getDate()+i);days.push(`${dd.getFullYear()}-${ttPad(dd.getMonth()+1)}-${ttPad(dd.getDate())}`);}}else if(p==="range"){if(ttDashRangeFrom&&ttDashRangeTo&&ttDashRangeTo>=ttDashRangeFrom){const cur=new Date(ttDashRangeFrom+"T12:00:00");const end=new Date(ttDashRangeTo+"T12:00:00");while(cur<=end){days.push(`${cur.getFullYear()}-${ttPad(cur.getMonth()+1)}-${ttPad(cur.getDate())}`);cur.setDate(cur.getDate()+1);}}}else{const[y,mo]=ttDashMonth.split("-").map(Number);const dim=new Date(y,mo,0).getDate();for(let i=1;i<=dim;i++)days.push(`${y}-${ttPad(mo)}-${ttPad(i)}`);} return days;}
  const pd=getPeriodDays(ttDashPeriod);let attH=0,workH=0,daysW=0;const byCli={},byWt={},gapDays=[];
  pd.forEach(ds=>{const d=ttDays[ds];if(!d)return;let dAtt=0;if(d.arrive&&d.leave&&ttV(d.arrive)&&ttV(d.leave)){dAtt=Math.max(0,(ttT2m(d.leave)-ttT2m(d.arrive))/60);attH+=dAtt;if(dAtt>0)daysW++;}let dWork=0;d.entries.forEach(e=>{const m=ttT2m(e.end)-ttT2m(e.start);const h=m>0?m/60:(e.hours||0);if(h<=0)return;workH+=h;dWork+=h;byCli[e.clientId]=(byCli[e.clientId]||0)+h;byWt[e.workTypeId]=(byWt[e.workTypeId]||0)+h;});if(dAtt>0){const g=dAtt-dWork;if(g>0.25)gapDays.push({date:ds,attH:dAtt,workH:dWork,gap:g});}});
  const cN=id=>ttClients.find(c=>c.id===id)?.fields[FC.name]||"לא ידוע";
  const wN=id=>ttWorkTypes.find(w=>w.id===id)?.fields[FW.name]||"לא ידוע";
  function bars(obj,nameFunc,clr){const sorted=Object.entries(obj).sort((a,b)=>b[1]-a[1]);if(!sorted.length)return`<div style="color:var(--muted);font-size:12px;text-align:center;padding:10px">אין נתונים</div>`;const max=sorted[0][1];return sorted.map(([id,h])=>`<div class="tt-bar-row"><div class="tt-bar-lbl"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:70%">${nameFunc(id)}</span><span>${ttFmtH(h)}</span></div><div class="tt-bar-bg"><div class="tt-bar-fill" style="width:${(h/max)*100}%;background:${clr}"></div></div></div>`).join("");}
  const totalGap=attH-workH;
  let expectedH=0;
  if(ttDashPeriod==='range'){
    const dh=ttCurEmp.fields[FE.dailyHours];
    if(dh&&dh>0){const todayStr=ttToday();const wDays=pd.filter(ds=>{if(ds>todayStr)return false;const dow=new Date(ds+"T12:00:00").getDay();return dow>=0&&dow<=4&&!ttIsHoliday(ds);}).length;expectedH=dh*wDays;}
  }else{const expMK=ttDashPeriod==='month'?ttDashMonth:ttCurrentMonthKey();expectedH=ttExpectedHours(ttCurEmp,expMK);}
  const expPct=expectedH>0?Math.round((workH/expectedH)*100):0;
  let gapHTML="";if(gapDays.length>0){const rows=gapDays.map(g=>`<tr style="cursor:pointer" onclick="ttDashGoDay('${g.date}')"><td>${ttDLbl(g.date)}</td><td style="text-align:center">${ttFmtH(g.attH)}</td><td style="text-align:center">${ttFmtH(g.workH)}</td><td style="text-align:center" class="tt-gap-val">${ttFmtH(g.gap)}</td></tr>`).join("");gapHTML=`<div class="tt-form" style="margin-top:12px"><div class="tt-ftitle">📋 ימים עם פער — לחץ לתיקון</div><table class="tt-gap-table"><thead><tr><th>תאריך</th><th style="text-align:center">נוכחות</th><th style="text-align:center">דווח</th><th style="text-align:center">פער</th></tr></thead><tbody>${rows}</tbody></table></div>`;}
  panel.innerHTML=`<div class="tt" style="max-width:none;padding:10px 16px 32px"><div class="tt-dash-inner">
    <div class="tt-period-btns">
      <button class="tt-period-btn${ttDashPeriod==='week'?' on':''}" onclick="ttSetPeriod('week')">שבוע נוכחי</button>
      <div class="tt-month-pick" style="position:relative;display:inline-block">
        <button class="tt-period-btn${ttDashPeriod==='month'?' on':''}" onclick="event.stopPropagation();ttPickMonthClick()">${ttMonthLabel(ttDashMonth)} ▾</button>
      </div>
      <button class="tt-period-btn${ttDashPeriod==='range'?' on':''}" onclick="ttSetPeriod('range')">📅 טווח תאריכים</button>
      ${ttDashPeriod==='range'?`<div class="tt-range-row">
        <span class="tt-range-lbl">מ:</span>
        <input type="date" class="tt-range-input" value="${ttDashRangeFrom}" onchange="ttSetRange('from',this.value)">
        <span class="tt-range-lbl">עד:</span>
        <input type="date" class="tt-range-input" value="${ttDashRangeTo}" onchange="ttSetRange('to',this.value)">
      </div>`:''}
    </div>
    ${totalGap>0.25?`<div class="tt-alert warn">⚠️ פער של <strong style="margin:0 4px">${ttFmtH(totalGap)}</strong> שע' לא מוסברות</div>`:""}
    ${gapHTML}
    <div class="tt-stat-grid">
      <div class="tt-stat"><div class="tt-stat-v">${ttFmtH(workH)}</div><div class="tt-stat-l">שעות בפועל</div></div>
      ${expectedH>0?`<div class="tt-stat"><div class="tt-stat-v">${ttFmtH(expectedH)}</div><div class="tt-stat-l">שעות מצופות</div></div>`:''}
      ${expectedH>0?`<div class="tt-stat"><div class="tt-stat-v" style="color:${expPct>=90?'var(--green)':expPct>=70?'var(--yellow)':'var(--red)'}">${expPct}%</div><div class="tt-stat-l">עמידה ביעד</div></div>`:`<div class="tt-stat"><div class="tt-stat-v">${ttFmtH(attH)}</div><div class="tt-stat-l">נוכחות</div></div>`}
      <div class="tt-stat"><div class="tt-stat-v">${daysW}</div><div class="tt-stat-l">ימי עבודה</div></div>
    </div>
    <div class="tt-dash-cols">
      <div class="tt-form"><div class="tt-ftitle">👥 שעות לפי לקוח</div>${bars(byCli,cN,"linear-gradient(90deg,var(--blue),var(--blue-light))")}</div>
      <div class="tt-form"><div class="tt-ftitle">🗂 שעות לפי סוג עבודה</div>${bars(byWt,wN,"linear-gradient(90deg,var(--green),#34d399)")}</div>
    </div>
  </div></div>`;
}

    let[emps,cls,wts,attR,wrkR]=await Promise.all([
      ttGet(TABLES.employees,"",[FE.fullName,FE.status,FE.password,FE.hideFromTT,FE.dailyHours,FE.role]),
      ttGet(TABLES.clients,`{${FC.name}}!=''`,[FC.name,FC.blocked]),
      ttGet(TABLES.workTypes,"",[FW.name,FW.allowedRoles]),
      ttGet(TABLES.attendance,`IS_AFTER({${FA.date}},'${agoStr}')`,[FA.employee,FA.date,FA.startTime,FA.endTime]),
      ttGet(TABLES.workEntries,`IS_AFTER({${FT.date}},'${agoStr}')`,[FT.employee,FT.client,FT.workType,FT.startTime,FT.endTime,FT.hours,FT.notes,FT.billable,FT.date]),
    ]);
    ttAllEmpsData=emps.filter(r=>{const st=r.fields[FE.status];const active=(st&&typeof st==="object"?st.name:st)==="פעיל";return active&&!r.fields[FE.hideFromTT];}).sort((a,b)=>(a.fields[FE.fullName]||"").localeCompare(b.fields[FE.fullName]||"","he"));
    ttClients=cls.sort((a,b)=>(a.fields[FC.name]||"").localeCompare(b.fields[FC.name]||"","he"));
    ttWorkTypes=wts.sort((a,b)=>(a.fields[FW.name]||"").localeCompare(b.fields[FW.name]||"","he"));
    ttAllDays={};ttAllEmpsData.forEach(e=>{ttAllDays[e.id]={};});
    attR.forEach(r=>{const empIds=r.fields[FA.employee]||[];const date=(r.fields[FA.date]||"").slice(0,10);if(!date)return;empIds.forEach(empId=>{if(!ttAllDays[empId])return;if(!ttAllDays[empId][date])ttAllDays[empId][date]={attendId:null,arrive:"",leave:"",entries:[]};ttAllDays[empId][date].attendId=r.id;ttAllDays[empId][date].arrive=ttITime(r.fields[FA.startTime]);ttAllDays[empId][date].leave=ttITime(r.fields[FA.endTime]);});});
    wrkR.forEach(r=>{const empIds=r.fields[FT.employee]||[];const date=r.fields[FT.date]?r.fields[FT.date].slice(0,10):r.fields[FT.startTime]?ttIDate(r.fields[FT.startTime]):null;if(!date)return;empIds.forEach(empId=>{if(!ttAllDays[empId])return;if(!ttAllDays[empId][date])ttAllDays[empId][date]={attendId:null,arrive:"",leave:"",entries:[]};const sISO=r.fields[FT.startTime],eISO=r.fields[FT.endTime];const startT=sISO?ttITime(sISO):"",endT=eISO?ttITime(eISO):"";const sm=ttT2m(startT),em=ttT2m(endT);ttAllDays[empId][date].entries.push({id:r.id,clientId:(r.fields[FT.client]||[])[0]||"",workTypeId:(r.fields[FT.workType]||[])[0]||"",start:startT,end:endT,hours:r.fields[FT.hours]||(em>sm?(em-sm)/60:0)});});});
    Object.values(ttAllDays).forEach(em=>Object.values(em).forEach(d=>d.entries.sort((a,b)=>a.start.localeCompare(b.start))));
    ttRenderAdminShell();
  }catch(e){document.querySelector(".tt-admin-body").innerHTML=`<div class="tt-alert err" style="margin:16px">שגיאה: ${e.message}</div>`;}
}

function ttExportCSV(filename,headers,rows){
  const BOM="\uFEFF";
  const esc=v=>{const s=String(v??"").replace(/"/g,'""');return s.includes(",")||s.includes('"')||s.includes("\n")?`"${s}"`:s;};
  const csv=BOM+[headers.map(esc).join(","),...rows.map(r=>r.map(esc).join(","))].join("\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
  const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=filename;a.click();URL.revokeObjectURL(url);
}
window.ttExportTab=function(){
  const days=ttGetMonthDays(ttAdminMonth).filter(ds=>ds<=ttToday());const ml=ttMonthLabel(ttAdminMonth);
  switch(ttAdminActiveTab){

      const rows=ttAllEmpsData.map(emp=>{const ed=ttAllDays[emp.id]||{};let attH=0,workH=0,daysW=0;days.forEach(ds=>{const d=ed[ds];if(!d)return;if(d.arrive&&d.leave&&ttV(d.arrive)&&ttV(d.leave)){const h=Math.max(0,(ttT2m(d.leave)-ttT2m(d.arrive))/60);attH+=h;}let dayHasWork=false;d.entries.forEach(e=>{const m=e.hours||Math.max(0,(ttT2m(e.end)-ttT2m(e.start))/60);workH+=m;if(m>0)dayHasWork=true;});if(dayHasWork)daysW++;});const expH=ttExpectedHours(emp,ttAdminMonth);const gap=attH-workH;const diff=workH-expH;
        return[emp.fields[FE.fullName],expH>0?ttFmtH(expH):"—",ttFmtH(workH),expH>0?ttFmtH(diff):"—",ttFmtH(attH),gap>0.1?ttFmtH(gap):"—",daysW,possibleDays];});
      ttExportCSV(`סיכום_${ml}.csv`,headers,rows);break;}
    case"attendance":{
      const headers=["עובד","תאריך","יום","כניסה","יציאה","סה\"כ"];const rows=[];
      ttAllEmpsData.forEach(emp=>{const ed=ttAllDays[emp.id]||{};const name=emp.fields[FE.fullName]||"";days.forEach(ds=>{const d=ed[ds];if(!d||(!d.arrive&&!d.leave&&d.entries.length===0))return;const h=(d.arrive&&d.leave&&ttV(d.arrive)&&ttV(d.leave))?Math.max(0,(ttT2m(d.leave)-ttT2m(d.arrive))/60):0;rows.push([name,ds,ttDLbl(ds).split(",")[0]||"",d.arrive||"",d.leave||"",h>0?ttFmtH(h):""]);});});
      ttExportCSV(`נוכחות_${ml}.csv`,headers,rows);break;}
    case"details":{
      const headers=["עובד","תאריך","התחלה","סיום","משך","לקוח","סוג עבודה"];const rows=[];
      const cN=id=>ttClients.find(c=>c.id===id)?.fields[FC.name]||"";const wN=id=>ttWorkTypes.find(w=>w.id===id)?.fields[FW.name]||"";
      ttAllEmpsData.forEach(emp=>{const ed=ttAllDays[emp.id]||{};const name=emp.fields[FE.fullName]||"";days.forEach(ds=>{const d=ed[ds];if(!d)return;d.entries.forEach(e=>{const m=ttT2m(e.end)-ttT2m(e.start);rows.push([name,ds,e.start,e.end,m>0?ttFmtH(m/60):"",cN(e.clientId),wN(e.workTypeId)]);});});});
      ttExportCSV(`פירוט_${ml}.csv`,headers,rows);break;}
    case"gaps":{
      const headers=["עובד","תאריך","נוכחות","דווח","פער"];const rows=[];
      ttAllEmpsData.forEach(emp=>{const ed=ttAllDays[emp.id]||{};const name=emp.fields[FE.fullName]||"";days.forEach(ds=>{const d=ed[ds];if(!d)return;let dAtt=0;if(d.arrive&&d.leave&&ttV(d.arrive)&&ttV(d.leave))dAtt=Math.max(0,(ttT2m(d.leave)-ttT2m(d.arrive))/60);let dWork=0;d.entries.forEach(e=>{const m=e.hours||Math.max(0,(ttT2m(e.end)-ttT2m(e.start))/60);dWork+=m;});const g=dAtt-dWork;if(dAtt>0&&dWork>0&&g>0.25)rows.push([name,ds,ttFmtH(dAtt),ttFmtH(dWork),ttFmtH(g)]);});});
      rows.sort((a,b)=>parseFloat(b[4])-parseFloat(a[4]));

    case"holidays":{

};
