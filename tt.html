// ── SUMMARY ───────────────────────────────────────────────────
function ttPossibleWorkDays(mk){const days=ttGetMonthDays(mk);return days.filter(ds=>{const dow=new Date(ds+"T12:00:00").getDay();return dow>=0&&dow<=4&&!ttIsHoliday(ds);}).length;}
function ttBuildSummary(){
  const days=ttGetMonthDays(ttAdminMonth);const possibleDays=ttPossibleWorkDays(ttAdminMonth);
  const rows=ttAllEmpsData.map(emp=>{
    const ed=ttAllDays[emp.id]||{};const name=emp.fields[FE.fullName]||"";let attH=0,workH=0,daysW=0;
    days.forEach(ds=>{const d=ed[ds];if(!d)return;let dayHasWork=false;if(d.arrive&&d.leave&&ttV(d.arrive)&&ttV(d.leave)){const h=Math.max(0,(ttT2m(d.leave)-ttT2m(d.arrive))/60);attH+=h;}d.entries.forEach(e=>{const m=e.hours||Math.max(0,(ttT2m(e.end)-ttT2m(e.start))/60);workH+=m;if(m>0)dayHasWork=true;});if(dayHasWork)daysW++;});
    const gap=attH-workH;const expH=ttExpectedHours(emp,ttAdminMonth);const diff=workH-expH;const expPct=expH>0?Math.round((workH/expH)*100):0;
    const badge=expH>0?(expPct>=90?`<span class="tt-badge ok">${expPct}%</span>`:expPct>=70?`<span class="tt-badge warn">${expPct}%</span>`:`<span class="tt-badge bad">${expPct}%</span>`):(gap>2?`<span class="tt-badge bad">${ttFmtH(gap)} פער</span>`:gap>0.5?`<span class="tt-badge warn">${ttFmtH(gap)} פער</span>`:`<span class="tt-badge ok">מאוזן</span>`);
    return`<tr><td><div class="tt-emp-name">${name}</div></td><td><div class="tt-emp-h">${expH>0?ttFmtH(expH):'—'}</div></td><td><div class="tt-emp-h">${ttFmtH(workH)}</div></td><td style="color:${diff>=0?'var(--green)':'var(--red)'};font-weight:700">${expH>0?(diff>=0?'+':'')+ttFmtH(diff):'—'}</td><td><div class="tt-emp-h">${ttFmtH(attH)}</div></td><td class="${gap>2?'tt-emp-gap big':gap>0.5?'tt-emp-gap':''}">${gap>0.1?ttFmtH(gap):"—"}</td><td>${daysW}</td><td>${possibleDays}</td><td>${badge}</td></tr>`;
  }).join("");
  const tAtt=ttAllEmpsData.reduce((s,e)=>{const ed=ttAllDays[e.id]||{};let h=0;days.forEach(ds=>{const d=ed[ds];if(d&&d.arrive&&d.leave&&ttV(d.arrive)&&ttV(d.leave))h+=Math.max(0,(ttT2m(d.leave)-ttT2m(d.arrive))/60);});return s+h;},0);
  const tWork=ttAllEmpsData.reduce((s,e)=>{const ed=ttAllDays[e.id]||{};let h=0;days.forEach(ds=>{const d=ed[ds];if(d)d.entries.forEach(en=>{const m=en.hours||Math.max(0,(ttT2m(en.end)-ttT2m(en.start))/60);h+=m;});});return s+h;},0);
  const tExp=ttAllEmpsData.reduce((s,e)=>s+ttExpectedHours(e,ttAdminMonth),0);const tDiff=tWork-tExp;
  return`<div class="tt-stat-grid" style="margin-bottom:14px"><div class="tt-stat"><div class="tt-stat-v">${ttAllEmpsData.length}</div><div class="tt-stat-l">עובדים</div></div><div class="tt-stat"><div class="tt-stat-v">${ttFmtH(tExp)}</div><div class="tt-stat-l">שעות מצופות</div></div><div class="tt-stat"><div class="tt-stat-v">${ttFmtH(tWork)}</div><div class="tt-stat-l">שעות בפועל</div></div><div class="tt-stat"><div class="tt-stat-v">${ttFmtH(tAtt)}</div><div class="tt-stat-l">נוכחות</div></div></div>
  <div style="overflow-x:auto"><table class="tt-emp-table"><thead><tr><th>עובד</th><th>שעות מצופות</th><th>שעות בפועל</th><th>הפרש</th><th>נוכחות</th><th>פער</th><th>ימים</th><th>ימים אפשריים</th><th>סטטוס</th></tr></thead><tbody>${rows||'<tr><td colspan="9" style="text-align:center;color:var(--muted);padding:20px">אין נתונים לחודש זה</td></tr>'}</tbody></table></div>`;
}

// ── ATTENDANCE ────────────────────────────────────────────────
function ttBuildAttendance(){
  const days=ttGetMonthDays(ttAdminMonth).filter(ds=>ds<=ttToday());
  return ttAllEmpsData.map(emp=>{
    const name=emp.fields[FE.fullName]||"";const ed=ttAllDays[emp.id]||{};
    const wd=days.filter(ds=>{const d=ed[ds];return d&&(d.arrive||d.entries.length>0);});if(!wd.length)return"";
    const rows=wd.map(ds=>{const d=ed[ds];const ah=(d.arrive&&d.leave&&ttV(d.arrive)&&ttV(d.leave))?ttFmtH(Math.max(0,(ttT2m(d.leave)-ttT2m(d.arrive))/60)):"";const dn=["ראשון","שני","שלישי","רביעי","חמישי","שישי","שבת"][new Date(ds+"T12:00:00").getDay()];return`<tr><td style="padding-right:24px">${ttDLblShort(ds)} ${dn}</td><td class="tt-time-cell">${d.arrive||'<span class="tt-missing">לא הוזן</span>'}</td><td class="tt-time-cell">${d.leave||'<span class="tt-missing">לא הוזן</span>'}</td><td style="font-weight:700;color:var(--blue)">${ah}</td></tr>`;}).join("");
    return`<div class="tt-admin-sec"><div class="tt-admin-sec-title">👤 ${name} — ${wd.length} ימים</div><div style="overflow-x:auto"><table class="tt-att-table"><thead><tr><th>תאריך</th><th>כניסה</th><th>יציאה</th><th>סה"כ</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
  }).join("")||`<div class="tt-empty" style="margin-top:20px">אין נתוני נוכחות לחודש זה</div>`;
}

// ── DETAILS ───────────────────────────────────────────────────
function ttBuildDetails(){
  const days=ttGetMonthDays(ttAdminMonth);const cN=id=>ttClients.find(c=>c.id===id)?.fields[FC.name]||"לא ידוע";const wN=id=>ttWorkTypes.find(w=>w.id===id)?.fields[FW.name]||"לא ידוע";
  return ttAllEmpsData.map(emp=>{
    const name=emp.fields[FE.fullName]||"";const ed=ttAllDays[emp.id]||{};const byCli={};let total=0;const allE=[];
    days.forEach(ds=>{const d=ed[ds];if(!d)return;d.entries.forEach(e=>{const h=e.hours||Math.max(0,(ttT2m(e.end)-ttT2m(e.start))/60);total+=h;byCli[e.clientId]=(byCli[e.clientId]||0)+h;allE.push({ds,...e});});});
    if(!allE.length)return"";
    const cliRows=Object.entries(byCli).sort((a,b)=>b[1]-a[1]).map(([id,h])=>`<div class="tt-bar-row"><div class="tt-bar-lbl"><span>${cN(id)}</span><span>${ttFmtH(h)}</span></div><div class="tt-bar-bg"><div class="tt-bar-fill" style="width:${(h/total)*100}%;background:linear-gradient(90deg,var(--blue),var(--blue-light))"></div></div></div>`).join("");
    const entRows=allE.map(e=>`<tr><td>${ttDLblShort(e.ds)}</td><td>${e.start}–${e.end}</td><td>${ttFmtH(e.hours)}</td><td>${cN(e.clientId)}</td><td>${wN(e.workTypeId)}</td></tr>`).join("");
    return`<div class="tt-admin-sec"><div class="tt-admin-sec-title">👤 ${name} — ${ttFmtH(total)} שעות</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:10px"><div>${cliRows}</div><div style="overflow:auto;max-height:200px"><table class="tt-att-table" style="font-size:11px"><thead><tr><th>תאריך</th><th>שעות</th><th>משך</th><th>לקוח</th><th>סוג</th></tr></thead><tbody>${entRows}</tbody></table></div></div></div>`;
  }).join("")||`<div class="tt-empty" style="margin-top:20px">אין דיווחים לחודש זה</div>`;
}

// ── GAPS ──────────────────────────────────────────────────────
function ttBuildGaps(){
  const days=ttGetMonthDays(ttAdminMonth).filter(ds=>ds<=ttToday());let allGaps=[];
  ttAllEmpsData.forEach(emp=>{const name=emp.fields[FE.fullName]||"";const ed=ttAllDays[emp.id]||{};days.forEach(ds=>{const d=ed[ds];if(!d||!d.arrive)return;const ah=(d.arrive&&d.leave&&ttV(d.arrive)&&ttV(d.leave))?Math.max(0,(ttT2m(d.leave)-ttT2m(d.arrive))/60):0;const wh=d.entries.reduce((s,e)=>{const m=ttT2m(e.end)-ttT2m(e.start);return s+(m>0?m/60:0);},0);const gap=ah-wh;if(gap>0.25)allGaps.push({name,ds,attH:ah,workH:wh,gap});});});
  allGaps.sort((a,b)=>b.gap-a.gap);
  if(!allGaps.length)return`<div class="tt-alert ok" style="margin-top:10px">✓ אין פערים לחודש זה!</div>`;
  const tGap=allGaps.reduce((s,g)=>s+g.gap,0);
  const rows=allGaps.map(g=>`<tr class="${g.gap>2?'gap-row':''}"><td class="tt-emp-name">${g.name}</td><td>${ttDLblShort(g.ds)}</td><td style="text-align:center">${ttFmtH(g.attH)}</td><td style="text-align:center">${ttFmtH(g.workH)}</td><td style="text-align:center" class="${g.gap>2?'tt-emp-gap big':'tt-emp-gap'}">${ttFmtH(g.gap)}</td></tr>`).join("");
  return`<div class="tt-alert warn" style="margin-bottom:12px">⚠️ ${allGaps.length} ימים עם פערים | סה"כ: <strong>${ttFmtH(tGap)}</strong> שעות</div><div style="overflow-x:auto"><table class="tt-emp-table"><thead><tr><th>עובד</th><th>תאריך</th><th style="text-align:center">נוכחות</th><th style="text-align:center">דווח</th><th style="text-align:center">פער</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

// ── LOCK PANEL ────────────────────────────────────────────────
function ttBuildLockPanel(){
  const ls=ttGetLockState();
  const monthOpts=ttMonthOptions().map(o=>`<option value="${o.k}">${o.label}</option>`).join("");
  const lockedMonths=(ls.lockedMonths||[]).map(mk=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span class="tt-lock-status active" style="margin:0">${ttMonthLabel(mk)} 🔒</span><button class="tt-lock-btn danger" onclick="ttUnlockMonth('${mk}')">שחרר</button></div>`).join("")||`<div style="color:var(--muted);font-size:12px">אין חודשים נעולים</div>`;
  return`<div class="tt-admin-sec"><div class="tt-admin-sec-title">📅 נעילת תאריך קצר</div>
    <div class="tt-lock-row"><label style="font-size:13px;font-weight:600">נעול לפני:</label><input type="date" class="tt-lock-input" id="tt-cutoff-input" value="${ls.cutoffDate||''}" max="${ttToday()}"/><button class="tt-lock-btn" onclick="ttSetCutoff()">קבע נעילה</button>${ls.cutoffDate?`<button class="tt-lock-btn danger" onclick="ttClearCutoff()">הסר</button>`:""}</div>
    ${ls.cutoffDate?`<div class="tt-lock-status active">🔒 נעול לפני ${ls.cutoffDate}</div>`:`<div class="tt-lock-status inactive">✓ אין נעילת תאריך קצר</div>`}
  </div>
  <div class="tt-admin-sec"><div class="tt-admin-sec-title">📆 נעילת חודש שלם</div>
    <div class="tt-lock-row"><select class="tt-lock-input" id="tt-lock-month-sel" style="direction:rtl">${monthOpts}</select><button class="tt-lock-btn" onclick="ttLockMonth()">נעל חודש</button></div>
    <div style="margin-top:10px">${lockedMonths}</div>
  </div>`;
}
window.ttSetCutoff=function(){const val=document.getElementById("tt-cutoff-input")?.value;if(!val)return;const ls=ttGetLockState();ls.cutoffDate=val;ttSetLockState(ls);ttToast(`✓ נעילה הוגדרה לפני ${val}`);ttRenderAdminContent();};
window.ttClearCutoff=function(){const ls=ttGetLockState();delete ls.cutoffDate;ttSetLockState(ls);ttToast("✓ נעילת תאריך הוסרה");ttRenderAdminContent();};
window.ttLockMonth=function(){const mk=document.getElementById("tt-lock-month-sel")?.value;if(!mk)return;const ls=ttGetLockState();if(!ls.lockedMonths)ls.lockedMonths=[];if(!ls.lockedMonths.includes(mk))ls.lockedMonths.push(mk);ttSetLockState(ls);ttToast(`✓ חודש ${ttMonthLabel(mk)} נעול`);ttRenderAdminContent();};
window.ttUnlockMonth=function(mk){const ls=ttGetLockState();ls.lockedMonths=(ls.lockedMonths||[]).filter(m=>m!==mk);ttSetLockState(ls);ttToast(`✓ חודש ${ttMonthLabel(mk)} שוחרר`);ttRenderAdminContent();};

// ── CLIENTS PANEL ─────────────────────────────────────────────
function ttBuildClientsPanel(){
  const ls=ttGetLockState();const blocked=ls.blockedClients||{};
  const rows=ttClients.map(c=>{const name=c.fields[FC.name]||"";const airtableBlocked=!!c.fields[FC.blocked];const localBlocked=!!blocked[c.id];const isBlocked=airtableBlocked||localBlocked;
    return`<tr><td class="tt-emp-name">${name}</td><td>${airtableBlocked?'<span class="tt-cli-blocked">🔒 Airtable</span>':'<span class="tt-cli-ok">✓</span>'}</td><td><label class="tt-toggle"><input type="checkbox" ${localBlocked?"checked":""} onchange="ttToggleClient('${c.id}',this.checked)"/><span class="tt-toggle-slider"></span></label></td><td>${isBlocked?'<span class="tt-cli-blocked">🚫 חסום</span>':'<span class="tt-cli-ok">✓ פתוח</span>'}</td></tr>`;
  }).join("");
  return`<div class="tt-alert info" style="margin-bottom:12px">💡 Toggle = חסימה ידנית (דפדפן). עמודת "חסום" ב-Airtable = חסימה קבועה לכל המכשירים.</div>
  <div style="overflow-x:auto"><table class="tt-cli-table"><thead><tr><th>שם לקוח</th><th>Airtable</th><th>חסימה ידנית</th><th>סטטוס</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}
window.ttToggleClient=function(id,blocked){const ls=ttGetLockState();if(!ls.blockedClients)ls.blockedClients={};if(blocked){ls.blockedClients[id]=true;}else{delete ls.blockedClients[id];}ttSetLockState(ls);ttToast(blocked?"🚫 לקוח נחסם":"✓ חסימה הוסרה");};

// ── HOLIDAYS PANEL ───────────────────────────────────────────
let ttEmpDashFilter=[];
window.ttToggleEmpFilter=function(empId){const idx=ttEmpDashFilter.indexOf(empId);if(idx>=0)ttEmpDashFilter.splice(idx,1);else ttEmpDashFilter.push(empId);ttRenderAdminContent();};
window.ttEmpFilterAll=function(){ttEmpDashFilter=[];ttRenderAdminContent();};
function ttBuildEmpDashboard(){
  const days=ttGetMonthDays(ttAdminMonth);
  const cN=id=>ttClients.find(c=>c.id===id)?.fields[FC.name]||"ללא לקוח";
  const filteredEmps=ttEmpDashFilter.length?ttAllEmpsData.filter(e=>ttEmpDashFilter.includes(e.id)):ttAllEmpsData;
  let filterHtml='<div style="margin-bottom:12px;display:flex;flex-wrap:wrap;gap:5px;align-items:center;"><span style="color:#94a3b8;font-size:12px;margin-left:6px;">סנן עובדים:</span>';
  filterHtml+='<button onclick="ttEmpFilterAll()" style="padding:3px 10px;border-radius:15px;border:1px solid '+(ttEmpDashFilter.length===0?'#3b82f6':'#1a2f45')+';background:'+(ttEmpDashFilter.length===0?'#1e40af':'transparent')+';color:'+(ttEmpDashFilter.length===0?'#fff':'#94a3b8')+';font-size:11px;cursor:pointer;font-family:inherit;">הכל</button>';
  ttAllEmpsData.forEach(emp=>{const sel=ttEmpDashFilter.includes(emp.id);filterHtml+='<button onclick="ttToggleEmpFilter(\''+emp.id+'\')" style="padding:3px 10px;border-radius:15px;border:1px solid '+(sel?'#3b82f6':'#1a2f45')+';background:'+(sel?'#1e40af':'transparent')+';color:'+(sel?'#fff':'#94a3b8')+';font-size:11px;cursor:pointer;font-family:inherit;">'+(emp.fields[FE.fullName]||"")+'</button>';});
  filterHtml+='</div>';
  let html=filterHtml+'<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;padding:0;">';
  filteredEmps.forEach(emp=>{
    const ed=ttAllDays[emp.id]||{};const name=emp.fields[FE.fullName]||"";
    let attH=0,workH=0,daysW=0;const clientMap={};
    days.forEach(ds=>{const d=ed[ds];if(!d)return;let dayHasWork=false;
      if(d.arrive&&d.leave&&ttV(d.arrive)&&ttV(d.leave)){const h=Math.max(0,(ttT2m(d.leave)-ttT2m(d.arrive))/60);attH+=h;}
      d.entries.forEach(e=>{const m=e.hours||Math.max(0,(ttT2m(e.end)-ttT2m(e.start))/60);workH+=m;if(m>0)dayHasWork=true;
        const cn=cN(e.clientId);clientMap[cn]=(clientMap[cn]||0)+m;});
      if(dayHasWork)daysW++;
    });
    const expH=ttExpectedHours(emp,ttAdminMonth);
    const pct=expH>0?Math.round((workH/expH)*100):0;
    const pctClass=pct>=90?"ok":pct>=70?"warn":"low";
    const topClients=Object.entries(clientMap).sort((a,b)=>b[1]-a[1]).slice(0,5);
    const maxCH=topClients.length?topClients[0][1]:1;
    html+='<div style="background:#111e2d;border:1px solid #1a2f45;border-radius:10px;padding:16px;">';
    html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">';
    html+='<h3 style="margin:0;color:#e2e8f0;font-size:16px;">'+name+'</h3>';
    html+='<span class="tt-badge '+pctClass+'">'+pct+'%</span></div>';
    html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;">';
    html+='<div style="background:#0d1520;padding:8px;border-radius:6px;text-align:center;"><div style="color:#94a3b8;font-size:11px;">שעות עבודה</div><div style="color:#38bdf8;font-size:18px;font-weight:bold;">'+ttFmtH(workH)+'</div></div>';
    html+='<div style="background:#0d1520;padding:8px;border-radius:6px;text-align:center;"><div style="color:#94a3b8;font-size:11px;">נוכחות</div><div style="color:#a78bfa;font-size:18px;font-weight:bold;">'+ttFmtH(attH)+'</div></div>';
    html+='<div style="background:#0d1520;padding:8px;border-radius:6px;text-align:center;"><div style="color:#94a3b8;font-size:11px;">צפוי</div><div style="color:#94a3b8;font-size:18px;font-weight:bold;">'+ttFmtH(expH)+'</div></div>';
    html+='<div style="background:#0d1520;padding:8px;border-radius:6px;text-align:center;"><div style="color:#94a3b8;font-size:11px;">ימים</div><div style="color:#94a3b8;font-size:18px;font-weight:bold;">'+daysW+'</div></div>';
    html+='</div>';
    if(topClients.length){
      html+='<div style="margin-bottom:10px;"><div style="color:#94a3b8;font-size:11px;margin-bottom:6px;">לקוחות מובילים</div>';
      topClients.forEach(([cn,ch])=>{
        const w=Math.round((ch/maxCH)*100);
        html+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;">';
        html+='<div style="width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#cbd5e1;font-size:11px;text-align:right;">'+cn+'</div>';
        html+='<div style="flex:1;background:#1e293b;border-radius:3px;height:14px;"><div style="width:'+w+'%;background:#38bdf8;height:100%;border-radius:3px;"></div></div>';
        html+='<div style="color:#94a3b8;font-size:10px;width:35px;">'+ttFmtH(ch)+'</div></div>';
      });
      html+='</div>';
    }
    const last7=days.slice(-7).reverse();
    if(last7.length){
      html+='<div style="color:#94a3b8;font-size:11px;margin-bottom:4px;">7 ימים אחרונים</div>';
      html+='<table style="width:100%;font-size:11px;border-collapse:collapse;"><tr style="color:#64748b;"><th style="text-align:right;padding:2px;">תאריך</th><th style="text-align:center;padding:2px;">נוכחות</th><th style="text-align:center;padding:2px;">עבודה</th></tr>';
      last7.forEach(ds=>{
        const d=ed[ds];
        const dd=ds.split("-");const dLabel=dd[2]+"/"+dd[1];
        let aH=0,wH=0;
        if(d){
          if(d.arrive&&d.leave&&ttV(d.arrive)&&ttV(d.leave))aH=Math.max(0,(ttT2m(d.leave)-ttT2m(d.arrive))/60);
          d.entries.forEach(e=>{wH+=e.hours||Math.max(0,(ttT2m(e.end)-ttT2m(e.start))/60);});
        }
        const rowColor=wH>0?"#e2e8f0":"#475569";
        html+='<tr style="color:'+rowColor+';border-top:1px solid #1a2f45;"><td style="text-align:right;padding:2px;">'+dLabel+'</td><td style="text-align:center;padding:2px;">'+(aH>0?ttFmtH(aH):"-")+'</td><td style="text-align:center;padding:2px;">'+(wH>0?ttFmtH(wH):"-")+'</td></tr>';
      });
      html+='</table>';
    }
    html+='</div>';
  });
  html+='</div>';
  return html;
}

    function ttBuildHolidaysPanel(){
  const sorted=[...ttHolidays].sort((a,b)=>a.date.localeCompare(b.date));
  const rows=sorted.map(h=>`<tr><td>${ttDLbl(h.date)}</td><td>${h.name}</td><td><button class="tt-xbtn" style="color:var(--red);border-color:var(--red)" onclick="ttDelHoliday('${h.id}')">✕ מחק</button></td></tr>`).join("");

      <div><label class="tt-fl">תאריך</label><input type="date" id="tt-hol-date" class="tt-fi" style="direction:ltr"/></div>

    </div>

  <div class="tt-alert info" style="margin-bottom:12px">💡 ימי חג לא נספרים כימי עבודה בחישוב שעות מצופות (ראשון–חמישי בלבד)</div>
  ${rows?`<div style="overflow-x:auto"><table class="tt-emp-table"><thead><tr><th>תאריך</th><th>שם החג</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>`:'<div class="tt-empty" style="margin-top:10px">אין ימי חג מוגדרים</div>'}`;

window.ttAddHoliday=async function(){
  const dateEl=document.getElementById("tt-hol-date");const nameEl=document.getElementById("tt-hol-name");
  const d=dateEl?.value;const n=nameEl?.value?.trim();
  if(!d){ttToast("יש לבחור תאריך",true);return;}
  if(!n){ttToast("יש להזין שם חג",true);return;}
  if(ttHolidays.some(h=>h.date===d)){ttToast("תאריך זה כבר מוגדר כחג",true);return;}
  try{
    const rec=await ttPost(TABLES.holidays,{[FH.date]:d,[FH.name]:n});
    ttHolidays.push({id:rec.id,date:d,name:n});
    ttToast("✓ חג נוסף");ttRenderAdminContent();
  }catch(e){ttToast("שגיאה: "+e.message,true);}
};
window.ttDelHoliday=async function(id){
  if(!confirm("למחוק חג זה?"))return;
  try{
    await ttDel(TABLES.holidays,id);
    ttHolidays=ttHolidays.filter(h=>h.id!==id);
    ttToast("✓ חג נמחק");ttRenderAdminContent();
  }catch(e){ttToast("שגיאה: "+e.message,true);}
};

// ── PAYROLL XLSX EXPORT ───────────────────────────────────────
// Generates two Excel files matching "לקוחות פלוס" report format:
//   1. דוח נוכחות   — one sheet per employee, daily attendance summary
//   2. דוח שעות מפורט — all work entries by date
window.ttExportPayrollXLSX=function(month){
  if(!window.XLSX){
    ttToast("טוען ספריית Excel…");
    const s=document.createElement('script');
    s.src='https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js';
    s.onerror=()=>ttToast("שגיאה בטעינת ספריית Excel",true);
    s.onload=()=>_ttDoPayrollExport(month);
    document.head.appendChild(s);
    return;
  }
  _ttDoPayrollExport(month);
};

function _ttDoPayrollExport(month){
  const XL=window.XLSX;
  const ml=ttMonthLabel(month);
  const days=ttGetMonthDays(month);
  const dayAbbr=['א','ב','ג','ד','ה','ו','ש'];
  const fmtDate=ds=>ds.split('-').reverse().join('/');
  const fmtH=h=>h>0?+h.toFixed(4):'';
  const cN=id=>(ttClients.find(c=>c.id===id)?.fields[FC.name])||'';
  const wN=id=>(ttWorkTypes.find(w=>w.id===id)?.fields[FW.name])||'';

  // ── Book 1: דוח נוכחות ──────────────────────────────────────
  const wb1=XL.utils.book_new();

  ttAllEmpsData.forEach(emp=>{
    const name=emp.fields[FE.fullName]||'';
    const dailyH=emp.fields[FE.dailyHours]||0;
    const ed=ttAllDays[emp.id]||{};

    const hdrs=['שם עובד','תאריך','יום','שעת כניסה','שעת יציאה',
                'שעות נוכחות','שעות מדווחות','שעות מצופות','הפרש',
                'שעות לא מדווחות','הערות'];
    const rows=[];
    let totAtt=0,totWork=0;

    // Only Sun-Thu + any holiday that falls on weekday
    days.forEach(ds=>{
      const dow=new Date(ds+'T12:00:00').getDay(); // 0=Sun … 6=Sat
      if(dow===5||dow===6)return; // skip Fri/Sat
      const holiday=ttHolidays.find(h=>h.date===ds);
      const d=ed[ds];
      let arrive='',leave='',attH=0,workH=0;

      if(d){
        arrive=d.arrive||''; leave=d.leave||'';
        if(arrive&&leave&&ttV(arrive)&&ttV(leave))
          attH=Math.max(0,(ttT2m(leave)-ttT2m(arrive))/60);
        d.entries.forEach(e=>{workH+=e.hours||Math.max(0,(ttT2m(e.end)-ttT2m(e.start))/60);});
      }
      totAtt+=attH; totWork+=workH;

      const diff=workH-dailyH;
      const unrep=attH-workH;
      rows.push([
        name, fmtDate(ds), dayAbbr[dow]||'',
        arrive||'', leave||'',
        fmtH(attH), fmtH(workH),
        dailyH||'', +diff.toFixed(4),
        unrep>0.01?fmtH(unrep):'',
        holiday?holiday.name:''
      ]);
    });

    // blank + totals
    rows.push([]);
    rows.push(['','','','','סה"כ',
               +totAtt.toFixed(2),+totWork.toFixed(2),'','','','']);

    const ws=XL.utils.aoa_to_sheet([hdrs,...rows]);
    ws['!cols']=[{wch:14},{wch:12},{wch:5},{wch:10},{wch:10},
                 {wch:12},{wch:12},{wch:12},{wch:10},{wch:14},{wch:20}];
    ws['!dir']='rtl';
    XL.utils.book_append_sheet(wb1,ws,name.slice(0,31));
  });

  XL.writeFile(wb1,`דוח_נוכחות_${ml}.xlsx`);

  // ── Book 2: דוח שעות מפורט ─────────────────────────────────
  const wb2=XL.utils.book_new();
  const hdrs2=['תאריך','יום','עובד','לקוח','סוג עבודה',
               'משעה','עד שעה','שעות','הערות'];
  const rows2=[];
  let tot2=0;

  ttAllEmpsData.forEach(emp=>{
    const name=emp.fields[FE.fullName]||'';
    const ed=ttAllDays[emp.id]||{};
    days.forEach(ds=>{
      const dow=new Date(ds+'T12:00:00').getDay();
      const d=ed[ds];
      if(!d||!d.entries.length)return;
      d.entries.forEach(e=>{
        const h=e.hours||Math.max(0,(ttT2m(e.end)-ttT2m(e.start))/60);
        tot2+=h;
        rows2.push([
          fmtDate(ds), dayAbbr[dow]||'', name,
          cN(e.clientId), wN(e.workTypeId),
          e.start||'', e.end||'',
          +h.toFixed(4), e.notes||''
        ]);
      });
    });
  });

  // Sort by date then employee
  rows2.sort((a,b)=>{
    const da=a[0].split('/').reverse().join('-');
    const db=b[0].split('/').reverse().join('-');
    return da.localeCompare(db)||a[2].localeCompare(b[2]);
  });

  rows2.push([]);
  rows2.push(['','','','','','','סה"כ',+tot2.toFixed(2),'']);

  const ws2=XL.utils.aoa_to_sheet([hdrs2,...rows2]);
  ws2['!cols']=[{wch:12},{wch:5},{wch:14},{wch:30},{wch:28},
                {wch:8},{wch:8},{wch:8},{wch:28}];
  ws2['!dir']='rtl';
  XL.utils.book_append_sheet(wb2,ws2,'שעות מפורט');
  XL.writeFile(wb2,`דוח_שעות_מפורט_${ml}.xlsx`);

  ttToast('✓ שני דוחות יוצאו בהצלחה — בדוק הורדות');
}

// ── BOOT ──────────────────────────────────────────────────────
ttLoadEmps();

})();
</script>
